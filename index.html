<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELD | Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 1. LEFT COLUMN: NAVIGATION */
        .sidebar-nav {
            width: 240px;
            background-color: #111111;
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            margin-top: 40px;
            flex-grow: 1;
        }

        .nav-links li {
            padding: 12px 0;
            color: #888888;
            cursor: pointer;
            transition: color 0.2s;
            font-size: 15px;
        }

        .nav-links li.active, .nav-links li:hover {
            color: #ffffff;
        }

        .status-mic {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #888888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00e5ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00e5ff;
        }

        /* 2. CENTER COLUMN: THE STAGE */
        .stage-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        .stage-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            color: #888888;
            font-size: 14px;
        }

        .waveform-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            width: 100%;
        }

        /* Pulsating Neon Waveform Simulation */
        .waveform-circle {
            width: 120px;
            height: 120px;
            border: 2px solid #00e5ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(0, 229, 255, 0.6); }
            100% { transform: scale(0.95); box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        }

        .inner-dot {
            width: 20px;
            height: 20px;
            background-color: #ffffff;
            border-radius: 50%;
        }

        .action-bar {
            background-color: #161616;
            border: 1px solid #262626;
            padding: 12px 30px;
            border-radius: 30px;
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .action-btn.leave {
            color: #ff3b30;
        }

        /* 3. RIGHT COLUMN: SPACE SIDEBAR */
        .sidebar-space {
            width: 280px;
            background-color: #111111;
            border-left: 1px solid #222222;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555555;
            margin-bottom: 15px;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-placeholder {
            width: 28px;
            height: 28px;
            background-color: #222222;
            border-radius: 50%;
        }

        .ping {
            font-size: 12px;
            color: #00e5ff;
        }
    </style>
</head>
<body>

    <nav class="sidebar-nav">
        <div>
            <div class="logo">MELD</div>
            <ul class="nav-links">
                <li class="active">Active Spaces</li>
                <li>Audio Settings</li>
                <li>Account</li>
            </ul>
        </div>
        <div class="status-mic">
            <div class="status-dot"></div>
            <span>Studio Mic Connected</span>
        </div>
    </nav>

    <main class="stage-container">
        <div class="stage-header">
            <span>Space: Alpha Room</span>
            <span>0ms Audio Latency</span>
        </div>

        <div class="waveform-container">
            <div class="waveform-circle">
                <div class="inner-dot"></div>
            </div>
        </div>

        <div class="action-bar">
            <button class="action-btn">Mute</button>
            <button class="action-btn">Copy Invite Link</button>
            <button class="action-btn leave">Leave Space</button>
        </div>
    </main>

    <aside class="sidebar-space">
        <div>
            <div class="section-title">Active In Space</div>
            <div class="user-list">
                <div class="user-item">
                    <div class="user-info">
                        <div class="avatar-placeholder"></div>
                        <span>You (Host)</span>
                    </div>
                    <span class="ping">0ms</span>
                </div>
                <div class="user-item">
                    <div class="user-info">
                        <div class="avatar-placeholder"></div>
                        <span>BetaTester_1</span>
                    </div>
                    <span class="ping">0ms</span>
                </div>
            </div>
        </div>
    </aside>

</body>
</html>

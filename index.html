<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. TOP ANCHOR MELD LINK HEADER */
        .umbrella-bar {
            width: 100%;
            background-color: #050505;
            border-bottom: 1px solid #111111;
            padding: 14px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .umbrella-link {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #666666;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }

        .umbrella-link:hover, .umbrella-link:active {
            color: #00e5ff;
        }

        /* 2. DIVISION BRANDING */
        .brand-container {
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }

        .logo {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #ffffff;
        }

        .tagline {
            font-size: 11px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 8px;
            font-weight: 700;
        }

        /* 3. FULL SCREEN EQUALIZER VISUALIZER AREA */
        .visualizer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
            width: 100%;
        }

        .visualizer-container {
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
        }

        .eq-bar {
            flex-grow: 1;
            max-width: 10px;
            height: 4px;
            background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%);
            border-radius: 4px;
            box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
            transition: height 0.05s ease;
        }

        .mic-toggle-link {
            font-size: 11px;
            color: #00e5ff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            background: none;
            border: 1px solid rgba(0, 229, 255, 0.3);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .mic-toggle-link.active {
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        /* 4. CONFIGURATION CARD */
        .setup-card {
            width: 100%;
            max-width: 440px;
            background: #070707;
            border: 1px solid #121212;
            padding: 28px 24px;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 25px;
        }

        .camera-preview-box {
            width: 100%;
            height: 160px;
            background-color: #0c0c0c;
            border: 1px dashed #222222;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .camera-preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .video-toggle-btn {
            background: #141414;
            border: 1px solid #222222;
            color: #aaaaaa;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 2;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .video-toggle-btn.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666666;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .input-group select {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            color: #ffffff;
            padding: 18px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        .jam-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 20px;
            border-radius: 35px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.15);
        }

        .jam-btn:active {
            transform: scale(0.97);
            background: #00e5ff;
        }

        /* 5. LANDING PAGE RECREATED HEXAGON NETWORK FOOTER */
        .footer-network {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            border-top: 1px solid #111111;
            padding-top: 25px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .hex-anchor {
            position: relative;
            width: 50px; 
            height: 28.87px;
            background-color: transparent;
            border-left: 2px solid #ffcc00;
            border-right: 2px solid #ffcc00;
            margin: 14.43px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s, filter 0.2s;
        }

        .hex-anchor::before, .hex-anchor::after {
            content: "";
            position: absolute;
            width: 35.36px;
            height: 35.36px;
            transform: scaleY(0.5774) rotate(-45deg);
            background-color: transparent;
            left: 5.3px; 
            z-index: 1;
        }

        .hex-anchor::before {
            top: -17.68px;
            border-top: 2px solid #ffcc00;
            border-right: 2px solid #ffcc00;
        }

        .hex-anchor::after {
            bottom: -17.68px;
            border-bottom: 2px solid #ffcc00;
            border-left: 2px solid #ffcc00;
        }

        .hex-inner-symbol {
            font-size: 18px;
            z-index: 5;
            position: relative;
            line-height: 1;
        }

        /* Styling fix to make the X character perfectly upright and clean */
        .symbol-x {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 800;
            font-size: 15px;
        }

        .hex-anchor:active {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px #ffcc00);
        }

        .latency-footer {
            font-size: 9px;
            color: #333333;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="umbrella-bar">
        <a href="https://meldliveapp.com" class="umbrella-link" target="_blank">Powered by MELD</a>
    </div>

    <div class="brand-container">
        <div class="logo">MYROC</div>
        <div class="tagline">High-Fidelity Audio Collaboration Engine</div>
    </div>

    <div class="visualizer-area">
        <div class="visualizer-container" id="eqContainer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
        <button class="mic-toggle-link" id="micBtn" onclick="toggleMicFeed()">Test Instrument Input</button>
    </div>

    <div class="setup-card">
        
        <div class="camera-preview-box">
            <video id="webcam" autoplay playsinline muted></video>
            <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Video Off</button>
        </div>

        <div class="input-group">
            <label for="instrument">What You're Plugging In</label>
            <select id="instrument">
                <option value="Electric Guitar">🎸 Electric Guitar</option>
                <option value="Bass Guitar">🎸 Bass Guitar</option>
                <option value="Electronic Drums">🥁 Electronic Drums</option>
                <option value="Piano / Keyboard">🎹 Digital Piano / Keyboard</option>
                <option value="Electric Violin">🎻 Electric Violin</option>
            </select>
        </div>

        <div class="input-group">
            <label for="search">Who You're Looking For</label>
            <select id="search">
                <option value="Electric Guitarist">🎸 Electric Guitarist</option>
                <option value="Bass Player">🎸 Bassist</option>
                <option value="Drummer">🥁 Drummer</option>
                <option value="Keyboardist">🎹 Keyboardist</option>
                <option value="Violinist">🎻 Violinist</option>
            </select>
        </div>

        <button class="jam-btn" onclick="enterJam()">Jam Now</button>
    </div>

    <div class="footer-network">
        <div class="social-row">
            <a href="https://instagram.com/meldliveapp" class="hex-anchor" target="_blank">
                <span class="hex-inner-symbol">📷</span>
            </a>
            <a href="https://tiktok.com/@meldlive" class="hex-anchor" target="_blank">
                <span class="hex-inner-symbol">🎵</span>
            </a>
            <a href="https://x.com" class="hex-anchor" target="_blank">
                <span class="hex-inner-symbol symbol-x">X</span>
            </a>
            <a href="mailto:meldliveapp@gmail.com" class="hex-anchor">
                <span class="hex-inner-symbol">✉️</span>
            </a>
        </div>
        <div class="latency-footer">
            Server Status: Operational (0ms)
        </div>
    </div>

    <script>
        let videoStream = null;
        let audioStream = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationFrameId = null;
        const barElements = document.querySelectorAll('.eq-bar');

        async function toggleMicFeed() {
            const micBtn = document.getElementById('micBtn');

            if (!audioStream) {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaStreamSource(audioStream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 64;
                    source.connect(analyser);
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    micBtn.innerText = "Mute Input";
                    micBtn.classList.add('active');
                    updateVisualizer();
                } catch (err) {
                    alert("Input permission was denied.");
                }
            } else {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                for (let i = 0; i < barElements.length; i++) barElements[i].style.height = '4px';
                micBtn.innerText = "Test Instrument Input";
                micBtn.classList.remove('active');
            }
        }

        function updateVisualizer() {
            if (!analyser) return;
            animationFrameId = requestAnimationFrame(updateVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            for (let i = 0; i < barElements.length; i++) {
                let binIndex = Math.floor(i * (dataArray.length / barElements.length));
                let value = dataArray[binIndex] || 0;
                let percentHeight = (value / 255) * 85; 
                barElements[i].style.height = `${Math.max(4, percentHeight)}px`;
            }
        }

        async function toggleCam() {
            const btn = document.getElementById('camBtn');
            const video = document.getElementById('webcam');

            if (!videoStream) {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = videoStream;
                    video.style.display = 'block';
                    btn.innerText = "Video On";
                    btn.classList.add('active');
                } catch (err) {
                    alert("Unable to access camera.");
                }
            } else {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
                video.style.display = 'none';
                btn.innerText = "Video Off";
                btn.classList.remove('active');
            }
        }

        function enterJam() {
            const inst = document.getElementById('instrument').value;
            const target = document.getElementById('search').value;
            alert(`Searching MYROC servers pairing your ${inst} with a ${target}...`);
        }
    </script>
</body>
</html>

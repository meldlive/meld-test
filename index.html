<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden; /* Strict viewport layout protection */
            padding-bottom: 10px;
        }

        /* 1. TOP HEADER LINK */
        .umbrella-bar {
            width: 100%;
            background-color: #050505;
            border-bottom: 1px solid #111111;
            padding: 8px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .umbrella-link {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #555555;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }

        .umbrella-link:hover, .umbrella-link:active {
            color: #00e5ff;
        }

        /* 2. BRANDING HEADLINE GROUP */
        .brand-container {
            text-align: center;
            margin-top: 5px;
            width: 100%;
            flex-shrink: 0;
        }

        .logo {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .tagline {
            font-size: 9px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2px;
            font-weight: 700;
        }

        /* 3. CENTRAL CONSOLE CARD FRAME */
        .setup-card {
            width: 90%;
            max-width: 400px;
            background: #060606;
            border: 1px solid #121212;
            padding: 12px 16px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex-shrink: 0;
            margin-top: 8px;
            margin-bottom: 10px;
        }

        /* VIDEO MODULE PREVIEW WITH FLEX DISPLAY FOR SPLIT SCREEN */
        .camera-preview-box {
            width: 100%;
            height: 150px; 
            background-color: #0a0a0a;
            border: 1px dashed #222222;
            border-radius: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .camera-preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Suppress native browser player interface overlays */
        video::-webkit-media-controls-start-playback-button,
        video::-webkit-media-controls-play-button,
        video::-webkit-media-controls-panel {
            display: none !important;
            -webkit-appearance: none;
        }

        /* Action button configured to clear central clutter */
        .video-toggle-btn {
            background: #111111;
            border: 1px solid #222222;
            color: #888888;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 2;
            position: relative;
            transition: all 0.2s;
        }

        /* Video Active Corner Overlay State */
        .video-toggle-btn.active {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-color: #00e5ff;
            color: #00e5ff;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            padding: 6px 12px;
        }

        /* AUDIO VISUALIZER MODULE */
        .visualizer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
            width: 100%;
            flex-shrink: 0;
        }

        .visualizer-container {
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .eq-bar {
            flex-grow: 1;
            margin: 0 1px;
            height: 2px;
            background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%);
            border-radius: 1px;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            transition: height 0.04s ease;
        }

        .mic-toggle-link {
            font-size: 9px;
            color: #00e5ff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            background: none;
            border: 1px solid rgba(0, 229, 255, 0.3);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .mic-toggle-link.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
        }

        /* DROPDOWN OPTIONS */
        .input-group {
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .input-group label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555555;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .input-group select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #161616;
            color: #ffffff;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        /* GLOWING ACTION JAM BUTTON */
        .jam-btn {
            width: 100%;
            background: #000000;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
            flex-shrink: 0;
        }

        .jam-btn:active {
            transform: scale(0.98);
            background: #00e5ff;
            color: #000000;
            box-shadow: 0 0 25px #00e5ff;
        }

        /* 4. FOOTER LINK DOCK CONTAINER */
        .footer-network {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .hex-anchor {
            position: relative;
            width: 34px; 
            height: 19.63px;
            background-color: transparent;
            border-left: 2px solid #00e5ff;
            border-right: 2px solid #00e5ff;
            margin: 4px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s;
        }

        .hex-anchor::before, .hex-anchor::after {
            content: "";
            position: absolute;
            width: 24.04px;
            height: 24.04px;
            transform: scaleY(0.5774) rotate(-45deg);
            background-color: transparent;
            left: 3.4px; 
            z-index: 1;
        }

        .hex-anchor::before {
            top: -12.02px;
            border-top: 2px solid #00e5ff;
            border-right: 2px solid #00e5ff;
        }

        .hex-anchor::after {
            bottom: -12.02px;
            border-bottom: 2px solid #00e5ff;
            border-left: 2px solid #00e5ff;
        }

        .hex-inner-symbol {
            font-size: 11px;
            z-index: 5;
            position: relative;
            line-height: 1;
        }

        /* STATUS BASELINE WITH GLOW EFFECT */
        .latency-footer {
            font-size: 8px;
            color: #222222;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
            text-align: center;
            width: 100%;
            transition: color 0.3s ease;
        }

        /* GLOWING PULSE ANIMATIONS */
        @keyframes pulse {
            0% { transform: scale(0.92); opacity: 0.6; }
            100% { transform: scale(1.08); opacity: 1; }
        }

        /* Peer simulated dancing EQ bars animation */
        @keyframes peerEQ {
            0% { height: 2px; }
            50% { height: 16px; }
            100% { height: 4px; }
        }
        @keyframes peerEQ-alt {
            0% { height: 6px; }
            50% { height: 3px; }
            100% { height: 14px; }
        }

        .peer-eq-bar {
            width: 2px;
            background: #00e5ff;
            border-radius: 1px;
            box-shadow: 0 0 6px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="umbrella-bar">
        <a href="https://meldliveapp.com" class="umbrella-link" target="_blank">Powered by MELD</a>
    </div>

    <div class="brand-container">
        <div class="logo">MYROC</div>
        <div class="tagline">Audio Collaboration Engine</div>
    </div>

    <div class="setup-card">
        
        <div class="camera-preview-box" style="display: flex;">
            
            <div id="local-video-container" style="width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; transition: width 0.3s ease;">
                <video id="webcam" autoplay playsinline muted></video>
                <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Click to Turn Video On</button>
            </div>

            <div id="peer-video-container" style="display: none; width: 50%; height: 100%; border-left: 1px solid #121212; position: relative; background: #080808; flex-direction: column; justify-content: center; align-items: center; transition: all 0.3s ease;">
                
                <video id="peerWebcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1;"></video>
                
                <div id="peer-placeholder" style="z-index: 2; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div id="peer-avatar" style="font-size: 28px; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.4)); animation: pulse 1.5s infinite alternate;">🥁</div>
                    <span id="peer-label" style="font-size: 8px; color: #00e5ff; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; font-weight: 700;">Matched Peer</span>
                    
                    <div style="display: flex; gap: 2px; height: 18px; align-items: flex-end; margin-top: 6px;">
                        <div class="peer-eq-bar" style="animation: peerEQ 0.4s infinite ease alternate;"></div>
                        <div class="peer-eq-bar" style="animation: peerEQ-alt 0.5s infinite ease alternate 0.1s;"></div>
                        <div class="peer-eq-bar" style="animation: peerEQ 0.3s infinite ease alternate 0.2s;"></div>
                        <div class="peer-eq-bar" style="animation: peerEQ-alt 0.6s infinite ease alternate 0.05s;"></div>
                    </div>
                </div>
            </div>

        </div>

        <div class="visualizer-area">
            <div class="visualizer-container" id="eqContainer">
                <script>
                    const container = document.getElementById('eqContainer');
                    for (let i = 0; i < 60; i++) {
                        const bar = document.createElement('div');
                        bar.className = 'eq-bar';
                        container.appendChild(bar);
                    }
                </script>
            </div>
            <button class="mic-toggle-link" id="micBtn" onclick="toggleMicFeed()">Test Instrument Input</button>
        </div>

        <div id="setup-inputs">
            <div class="input-group">
                <label for="instrument">What You're Plugging In</label>
                <select id="instrument">
                    <option value="guitar">🎸 Electric Guitar</option>
                    <option value="bass">🎸 Bass Guitar</option>
                    <option value="drums">🥁 Electronic Drums</option>
                    <option value="keys">🎹 Digital Piano / Keyboard</option>
                    <option value="violin">🎻 Electric Violin</option>
                </select>
            </div>

            <div class="input-group">
                <label for="search">Who You're Looking For</label>
                <select id="search">
                    <option value="guitar">🎸 Electric Guitar</option>
                    <option value="bass">🎸 Bass Guitar</option>
                    <option value="drums">🥁 Electronic Drums</option>
                    <option value="keys">🎹 Digital Piano / Keyboard</option>
                    <option value="violin">🎻 Electric Violin</option>
                </select>
            </div>

            <button class="jam-btn" onclick="enterJam()">Jam Now</button>
        </div>

        <div id="jam-room-display" style="display: none; flex-direction: column; align-items: center; padding: 10px 0; gap: 12px; margin-top: 5px;">
            <h2 style="font-size: 18px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px;">Jam Room</h2>
            <p id="jam-status" style="font-size: 10px; color: #888888; text-transform: uppercase; letter-spacing: 1px; text-align: center; line-height: 1.4;"></p>
            <button class="jam-btn" style="border-color: #ff3b30; color: #ff3b30; box-shadow: 0 0 12px rgba(255, 59, 48, 0.15);" onclick="leaveJam()">Disconnect</button>
        </div>

    </div>

    <div class="footer-network">
        <div class="social-row">
            <a href="https://instagram.com/meldlive" class="hex-anchor" target="_blank">
                <i class="fa-brands fa-instagram hex-inner-symbol"></i>
            </a>
            <a href="https://tiktok.com/@meldlive" class="hex-anchor" target="_blank">
                <i class="fa-brands fa-tiktok hex-inner-symbol"></i>
            </a>
            <a href="https://x.com/meldlive" class="hex-anchor" target="_blank">
                <i class="fa-brands fa-x-twitter hex-inner-symbol"></i>
            </a>
            <a href="mailto:meldliveapp@gmail.com" class="hex-anchor">
                <i class="fa-regular fa-envelope hex-inner-symbol"></i>
            </a>
        </div>
        <div class="latency-footer" id="latency-val">
            Initializing MELD Network...
        </div>
    </div>

    <script>
        // DEVELOPER SNIFFER: Outputs syntax or code errors straight to the screen footer
        window.onerror = function(message, source, lineno, colno, error) {
            const footer = document.getElementById('latency-val');
            if (footer) {
                footer.innerText = "Error: " + message + " (Line " + lineno + ")";
                footer.style.color = '#ff3b30';
            }
            return false;
        };

        let videoStream = null;
        let audioStream = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationFrameId = null;
        let barElements = [];

        // PeerJS & Matchmaking variables
        let myPeer = null;
        let myPeerId = null;
        let activeCall = null;
        let pubnub = null;
        let currentLobbyChannel = 'myroc-global-lobby';

        // Display name mapping maps for standardized value keys
        const instrumentLabels = {
            'guitar': 'Electric Guitar',
            'bass': 'Bass Guitar',
            'drums': 'Electronic Drums',
            'keys': 'Digital Piano / Keyboard',
            'violin': 'Electric Violin'
        };

        const searchLabels = {
            'guitar': 'Electric Guitar',
            'bass': 'Bass Guitar',
            'drums': 'Electronic Drums',
            'keys': 'Digital Piano / Keyboard',
            'violin': 'Electric Violin'
        };

        // Connect both networks on startup
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Initialize PeerJS with a clean unique ID
            const randomId = 'MYROC-' + Math.floor(1000 + Math.random() * 9000);
            myPeer = new Peer(randomId);

            myPeer.on('open', (id) => {
                myPeerId = id;
                document.getElementById('latency-val').innerText = "System Status: Ready to Jam";
                document.getElementById('latency-val').style.color = '#00e5ff';
            });

            // Handle incoming WebRTC audio/video call automatically
            myPeer.on('call', (call) => {
                activeCall = call;
                
                // Construct a local media stream containing whatever feeds the user has turned on
                let streamsToOffer = new MediaStream();
                if (videoStream) videoStream.getVideoTracks().forEach(t => streamsToOffer.addTrack(t));
                if (audioStream) audioStream.getAudioTracks().forEach(t => streamsToOffer.addTrack(t));
                
                call.answer(streamsToOffer);
                
                call.on('stream', (remoteStream) => {
                    const callerInstrument = call.metadata ? call.metadata.instrument : 'Partner';
                    const cleanTargetName = searchLabels[callerInstrument] || callerInstrument;
                    handleMatchedPeerStream(remoteStream, cleanTargetName);
                });
            });

            // 2. Initialize PubNub with secure developer keys
            pubnub = new PubNub({
                publishKey: 'pub-c-987e3578-5b94-4326-a99f-6119854af048',
                subscribeKey: 'sub-c-5aed2913-ab13-4dbc-b66f-ff97ec4ae16c',
                userId: randomId,
                uuid: randomId
            });

            // Listen for matchmaking signals in the background
            pubnub.addListener({
                message: function(event) {
                    const msg = event.message;
                    
                    // Ignore our own search messages
                    if (msg.peerId === myPeerId) return;

                    // Matchmaking Logic: Do their criteria match our current search?
                    const myInstrument = document.getElementById('instrument').value; // e.g., 'guitar'
                    const myTarget = document.getElementById('search').value; // e.g., 'drums'

                    if (msg.action === 'searching' && msg.instrument === myTarget && msg.lookingFor === myInstrument) {
                        // WE HAVE A MATCH! 
                        // Stop searching and notify the other peer directly that we are locking onto them
                        pubnub.publish({
                            channel: currentLobbyChannel,
                            message: {
                                action: 'match-found',
                                targetId: msg.peerId,
                                matchId: myPeerId,
                                instrument: myInstrument
                            }
                        });
                        
                        // Call them directly via PeerJS to start WebRTC audio/video stream exchange
                        connectToPeer(msg.peerId, msg.instrument);
                    } 
                    
                    else if (msg.action === 'match-found' && msg.targetId === myPeerId) {
                        // The other peer found us and told us to stand by for their connection call
                        document.getElementById('jam-status').innerText = "CONNECTING DIRECTLY...";
                    }
                }
            });

            pubnub.subscribe({ channels: [currentLobbyChannel] });
        });

        // Triggered when matchmaking finds a partner
        function connectToPeer(targetPeerId, peerInstrumentKey) {
            let streamsToOffer = new MediaStream();
            if (videoStream) videoStream.getVideoTracks().forEach(t => streamsToOffer.addTrack(t));
            if (audioStream) audioStream.getAudioTracks().forEach(t => streamsToOffer.addTrack(t));

            activeCall = myPeer.call(targetPeerId, streamsToOffer, {
                metadata: { instrument: document.getElementById('instrument').value }
            });
            
            activeCall.on('stream', (remoteStream) => {
                const cleanTargetName = searchLabels[peerInstrumentKey] || peerInstrumentKey;
                handleMatchedPeerStream(remoteStream, cleanTargetName);
            });
        }

        // Renders the real live audio/video stream inside your split screen card
        function handleMatchedPeerStream(remoteStream, targetName = "Matched Partner") {
            const peerVideoElement = document.getElementById('peerWebcam');
            
            // Route the WebRTC stream to the video element
            peerVideoElement.srcObject = remoteStream;
            peerVideoElement.style.display = 'block';
            
            // Update connection UI state
            document.getElementById('jam-status').innerText = `CONNECTED! Jamming with ${targetName}`;
            document.getElementById('jam-status').style.color = '#00e5ff';
            document.getElementById('latency-val').innerText = "P2P Connection: Active (12ms Latency)";
            document.getElementById('latency-val').style.color = '#00e5ff';

            // Visually split screen to render their camera angle
            document.getElementById('local-video-container').style.width = '50%';
            document.getElementById('peer-video-container').style.display = 'flex';
            document.getElementById('peer-placeholder').style.display = 'none'; // Hide backup emoji
        }

        // Explicit starter helper to guarantee audio is active on match
        async function startAudio() {
            if (!audioStream) {
                const micBtn = document.getElementById('micBtn');
                barElements = document.querySelectorAll('.eq-bar');
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaStreamSource(audioStream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    micBtn.innerText = "Mute Input";
                    micBtn.classList.add('active');
                    updateVisualizer();
                } catch (err) {
                    console.warn("Could not start audio stream:", err);
                }
            }
        }

        // Explicit starter helper to guarantee video is active on match
        async function startVideo() {
            if (!videoStream) {
                const btn = document.getElementById('camBtn');
                const video = document.getElementById('webcam');
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = videoStream;
                    video.style.display = 'block';
                    btn.innerText = "Turn Video Off"; 
                    btn.classList.add('active');
                } catch (err) {
                    console.warn("Could not start video stream:", err);
                }
            }
        }

        async function toggleMicFeed() {
            if (!audioStream) {
                await startAudio();
            } else {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                for (let i = 0; i < barElements.length; i++) barElements[i].style.height = '2px';
                const micBtn = document.getElementById('micBtn');
                micBtn.innerText = "Test Instrument Input";
                micBtn.classList.remove('active');
            }
        }

        function updateVisualizer() {
            if (!analyser) return;
            animationFrameId = requestAnimationFrame(updateVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            for (let i = 0; i < barElements.length; i++) {
                let binIndex = Math.floor(Math.pow(i / barElements.length, 1.5) * (dataArray.length * 0.7));
                let value = dataArray[binIndex] || 0;
                let percentHeight = (value / 255) * 50; 
                barElements[i].style.height = `${Math.max(2, percentHeight)}px`;
            }
        }

        async function toggleCam() {
            if (!videoStream) {
                await startVideo();
            } else {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
                const video = document.getElementById('webcam');
                video.style.display = 'none';
                const btn = document.getElementById('camBtn');
                btn.innerText = "Click to Turn Video On"; 
                btn.classList.remove('active');
            }
        }

        // Begins real background matchmaking & automatically requests feeds
        async function enterJam() {
            const instKey = document.getElementById('instrument').value;
            const targetKey = document.getElementById('search').value;
            const latencyFooter = document.getElementById('latency-val');
            
            const cleanTargetName = searchLabels[targetKey];
            
            // Auto-trigger permissions so user isn't blank/muted when matched
            await startAudio();
            await startVideo();

            // Hide selection dropdowns and the initial jam button
            document.getElementById('setup-inputs').style.display = 'none';
            
            // Set state to searching
            document.getElementById('jam-status').innerText = `SEARCHING FOR A ${cleanTargetName.toUpperCase()}...`;
            document.getElementById('jam-status').style.color = '#888888';
            latencyFooter.innerText = "Lobby Status: Matchmaking Active...";
            latencyFooter.style.color = '#888888';
            
            // Reveal active Jam Room space
            const jamDisplay = document.getElementById('jam-room-display');
            jamDisplay.style.display = 'flex';

            // Reset UI layout containers
            document.getElementById('local-video-container').style.width = '100%';
            document.getElementById('peer-video-container').style.display = 'none';
            document.getElementById('peerWebcam').style.display = 'none';
            document.getElementById('peer-placeholder').style.display = 'flex';

            // Dynamically set matching peer avatar based on our standardized key
            const peerAvatar = document.getElementById('peer-avatar');
            if (targetKey === "guitar" || targetKey === "bass") peerAvatar.innerText = "🎸";
            else if (targetKey === "drums") peerAvatar.innerText = "🥁";
            else if (targetKey === "keys") peerAvatar.innerText = "🎹";
            else if (targetKey === "violin") peerAvatar.innerText = "🎻";

            document.getElementById('peer-label').innerText = cleanTargetName;

            // Background Broadcast: Signal to everyone in the lobby what we have and what we need
            pubnub.publish({
                channel: currentLobbyChannel,
                message: {
                    action: 'searching',
                    peerId: myPeerId,
                    instrument: instKey,
                    lookingFor: targetKey
                }
            });
        }

        // Returns seamlessly back to setup screen
        function leaveJam() {
            if (activeCall) {
                activeCall.close();
                activeCall = null;
            }

            // Inform the lobby we are out
            pubnub.publish({
                channel: currentLobbyChannel,
                message: {
                    action: 'disconnected',
                    peerId: myPeerId
                }
            });

            // Hide the active Jam Room controls
            document.getElementById('jam-room-display').style.display = 'none';
            
            // Bring back setup dropdowns
            document.getElementById('setup-inputs').style.display = 'block';

            // Collapse screen split back to 100% full local view
            document.getElementById('local-video-container').style.width = '100%';
            document.getElementById('peer-video-container').style.display = 'none';

            // Reset latency footer back to default idle state
            const latencyFooter = document.getElementById('latency-val');
            latencyFooter.innerText = "System Status: Ready to Jam";
            latencyFooter.style.color = '#00e5ff';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden; padding-bottom: 10px; }

        .umbrella-bar { width: 100%; background-color: #050505; border-bottom: 1px solid #111111; padding: 8px 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .umbrella-link { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #555555; text-transform: uppercase; text-decoration: none; }
        .brand-container { text-align: center; margin-top: 5px; width: 100%; flex-shrink: 0; }
        .logo { font-size: 34px; font-weight: 900; letter-spacing: 8px; background: linear-gradient(180deg, #ffffff 0%, #888888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; line-height: 1.1; }
        .tagline { font-size: 9px; color: #444444; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; font-weight: 700; }
        
        .setup-card { width: 90%; max-width: 400px; background: #060606; border: 1px solid #121212; padding: 24px 16px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.95); display: flex; flex-direction: column; flex-shrink: 0; margin-top: 8px; margin-bottom: 10px; }
        
        .gate-title { font-size: 14px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 15px; font-weight: 800; }
        .gate-input { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 12px; border-radius: 12px; font-size: 16px; outline: none; text-align: center; letter-spacing: 3px; margin-bottom: 15px; }
        .gate-error-msg { color: #ff3b30; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; display: none; font-weight: 700; }
        
        /* SIGN UP SECTION */
        .signup-section { margin-top: 20px; border-top: 1px solid #161616; padding-top: 20px; }
        .signup-text { font-size: 9px; color: #555555; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; }
        
        .jam-btn { width: 100%; background: #000000; color: #00e5ff; border: 2px solid #00e5ff; padding: 12px; border-radius: 30px; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: all 0.2s ease; }
        
        /* Shared Styles (Video/Footer remain same) */
        .camera-preview-box { width: 100%; height: 150px; background-color: #0a0a0a; border: 1px dashed #222222; border-radius: 14px; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .bandwidth-shield { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.9); border-radius: 14px; z-index: 10; flex-direction: column; justify-content: center; align-items: center; padding: 15px; text-align: center; }
        .footer-network { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 5px; }
        .hex-anchor { position: relative; width: 34px; height: 19.63px; border-left: 2px solid #00e5ff; border-right: 2px solid #00e5ff; margin: 4px 0; display: flex; justify-content: center; align-items: center; text-decoration: none; color: #ffffff; }
        .latency-footer { font-size: 8px; color: #222222; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; text-align: center; width: 100%; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="umbrella-bar"><a href="https://meldliveapp.com" class="umbrella-link" target="_blank">Powered by MELD</a></div>
    <div class="brand-container">
        <div class="logo">MYROC</div>
        <div class="tagline" id="brand-tagline">Beta Portal Access</div>
    </div>

    <!-- GATE CARD -->
    <div class="setup-card" id="password-gate-card">
        <h3 class="gate-title">Enter Access Key</h3>
        <input type="password" class="gate-input" id="portal-password" placeholder="••••••••" onkeydown="handleGateKeyPress(event)">
        <div class="gate-error-msg" id="gate-error">Access Denied. Invalid Beta Key.</div>
        <button class="jam-btn" onclick="verifyBetaPassword()">Unlock Portal</button>

        <div class="signup-section">
            <p class="signup-text">Don't have a key? Sign up for Beta access below:</p>
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <input type="email" name="email" class="gate-input" placeholder="ENTER YOUR EMAIL" required style="font-size: 12px;">
                <button type="submit" class="jam-btn" style="border-color: #555555; color: #ffffff; padding: 8px; font-size: 10px;">SUBMIT REQUEST</button>
            </form>
        </div>
    </div>

    <!-- APPARATUS (Main Portal Hidden until Auth) -->
    <div class="setup-card" id="app-portal-card" style="display: none; padding: 12px 16px;">
        <!-- [Main Portal code remains exactly the same as previously optimized] -->
    </div>

    <!-- Scripts and Footer remain unchanged -->
    <script>
        // Setup Formspree: Go to Formspree.io, create a free account, 
        // create a new form, and replace 'YOUR_FORMSPREE_ID' in the action line above!
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden; padding-bottom: 10px; }
        .umbrella-bar { width: 100%; background-color: #050505; border-bottom: 1px solid #111111; padding: 8px 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .umbrella-link { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #555555; text-transform: uppercase; text-decoration: none; }
        .brand-container { text-align: center; margin-top: 5px; width: 100%; flex-shrink: 0; }
        .logo { font-size: 34px; font-weight: 900; letter-spacing: 8px; background: linear-gradient(180deg, #ffffff 0%, #888888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; line-height: 1.1; }
        .tagline { font-size: 9px; color: #444444; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; font-weight: 700; }
        .setup-card { width: 90%; max-width: 400px; background: #060606; border: 1px solid #121212; padding: 24px 16px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: flex-start; flex-shrink: 0; margin-top: 8px; margin-bottom: 10px; }
        .gate-title { font-size: 14px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 15px; font-weight: 800; }
        .gate-input { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 12px; border-radius: 12px; font-size: 16px; outline: none; text-align: center; letter-spacing: 3px; margin-bottom: 15px; }
        .gate-error-msg { color: #ff3b30; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; display: none; font-weight: 700; }
        .signup-section { margin-top: 20px; border-top: 1px solid #161616; padding-top: 20px; }
        .signup-text { font-size: 9px; color: #555555; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; }
        .camera-preview-box { width: 100%; height: 150px; background-color: #0a0a0a; border: 1px dashed #222222; border-radius: 14px; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; flex-shrink: 0; }
        .camera-preview-box video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        .video-toggle-btn { background: rgba(0,0,0,0.6); border: 1px solid #00e5ff; color: #00e5ff; padding: 6px 12px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; z-index: 2; position: relative; }
        .visualizer-area { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 10px; width: 100%; }
        .visualizer-container { width: 100%; height: 50px; display: flex; align-items: center; justify-content: space-between; }
        .eq-bar { flex-grow: 1; margin: 0 1px; height: 2px; background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%); border-radius: 1px; }
        .mic-toggle-link { font-size: 9px; color: #00e5ff; background: none; border: 1px solid rgba(0, 229, 255, 0.3); cursor: pointer; padding: 4px 10px; border-radius: 20px; }
        .mic-toggle-link.active { background: rgba(0, 229, 255, 0.1); }
        .input-group { margin-bottom: 8px; width: 100%; }
        .input-group label { display: block; font-size: 9px; text-transform: uppercase; color: #555555; margin-bottom: 4px; font-weight: 700; }
        .input-group select { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 10px; border-radius: 12px; font-size: 14px; }
        .jam-btn { width: 100%; background: #000000; color: #00e5ff; border: 2px solid #00e5ff; padding: 12px; border-radius: 30px; font-size: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .footer-network { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 15px; }
        .social-row { display: flex; justify-content: center; gap: 16px; }
        .hex-anchor { width: 34px; height: 19.63px; border-left: 2px solid #00e5ff; border-right: 2px solid #00e5ff; display: flex; justify-content: center; align-items: center; text-decoration: none; color: #ffffff; }
    </style>
</head>
<body>
    <div class="umbrella-bar"><a href="https://meldliveapp.com" class="umbrella-link">Powered by MELD</a></div>
    <div class="brand-container"><div class="logo">MYROC</div><div class="tagline" id="brand-tagline">Beta Portal Access</div></div>

    <div class="setup-card" id="password-gate-card">
        <h3 class="gate-title">Enter Access Key</h3>
        <input type="password" class="gate-input" id="portal-password" placeholder="••••••••">
        <button class="jam-btn" onclick="verifyBetaPassword()">Unlock Portal</button>
        <div class="signup-section">
            <p class="signup-text">Don't have a key? Sign up for Beta access below:</p>
            <form action="https://formspree.io/f/mzdnbnen" method="POST">
                <input type="email" name="email" class="gate-input" placeholder="ENTER YOUR EMAIL" required>
                <button type="submit" class="jam-btn" style="border-color: #555555; color: #ffffff; padding: 8px;">SUBMIT REQUEST</button>
            </form>
        </div>
    </div>

    <div class="setup-card" id="app-portal-card" style="display: none;">
        <div class="camera-preview-box">
            <div id="local-video-container" style="width: 100%; height: 100%; display: flex; align-items: center;">
                <video id="webcam" autoplay playsinline muted></video>
                <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Click to Turn Video On</button>
            </div>
            <div id="peer-video-container" style="display: none; width: 50%; height: 100%; border-left: 1px solid #121212;">
                <video id="peerWebcam" autoplay playsinline style="width: 100%; height: 100%;"></video>
            </div>
        </div>
        <div class="visualizer-area">
            <div class="visualizer-container" id="eqContainer"></div>
            <button class="mic-toggle-link" id="micBtn" onclick="toggleMicFeed()">Test Instrument Input</button>
        </div>
        <div id="setup-inputs">
            <div class="input-group"><label>What You're Plugging In</label><select id="instrument"><option value="guitar">🎸 Electric Guitar</option></select></div>
            <div class="input-group"><label>Who You're Looking For</label><select id="search"><option value="guitar">🎸 Electric Guitar</option></select></div>
            <button class="jam-btn" onclick="enterJam()">Jam Now</button>
        </div>
        <div id="jam-room-display" style="display: none; flex-direction: column; align-items: center;">
            <p id="jam-status">Jam Room</p>
            <button class="jam-btn" onclick="leaveJam()" style="border-color: #ff3b30; color: #ff3b30; margin-top:10px;">Disconnect</button>
        </div>
    </div>

    <div class="footer-network">
        <div class="social-row">
            <a href="https://instagram.com/meldlive" class="hex-anchor"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://tiktok.com/@meldlive" class="hex-anchor"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://x.com/meldlive" class="hex-anchor"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="mailto:meldliveapp@gmail.com" class="hex-anchor"><i class="fa-regular fa-envelope"></i></a>
        </div>
    </div>

    <script>
        const container = document.getElementById('eqContainer');
        for (let i = 0; i < 60; i++) { container.appendChild(document.createElement('div')).className = 'eq-bar'; }
        let videoStream = null, audioStream = null, audioContext = null, analyser = null, myId = null, peerConnection = null, pubnub = null, searchInterval = null;

        function verifyBetaPassword() {
            if (document.getElementById('portal-password').value.trim().toLowerCase() === "meldjam") {
                document.getElementById('password-gate-card').style.display = 'none';
                document.getElementById('app-portal-card').style.display = 'block';
                initializePubNub();
            }
        }
        function initializePubNub() {
            myId = 'MYROC-' + Math.floor(1000 + Math.random() * 9000);
            pubnub = new PubNub({ publishKey: 'pub-c-987e3578-5b94-4326-a99f-6119854af048', subscribeKey: 'sub-c-5aed2913-ab13-4dbc-b66f-ff97ec4ae16c', userId: myId });
            pubnub.addListener({ message: function(event) {
                if (event.message.action === 'searching' && event.message.peerId !== myId) initiateWebRTCCall(event.message.peerId);
            }});
        }
        async function startAudio() {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, channelCount: 2 } });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(audioStream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 128;
            source.connect(analyser);
            document.getElementById('micBtn').innerText = "Mute Input";
            updateVisualizer();
        }
        async function startVideo() {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('webcam').srcObject = videoStream;
            document.getElementById('webcam').style.display = 'block';
            document.getElementById('camBtn').innerText = "Turn Video Off";
        }
        function updateVisualizer() {
            if (!analyser) return;
            requestAnimationFrame(updateVisualizer);
            let dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            document.querySelectorAll('.eq-bar').forEach((bar, i) => bar.style.height = `${Math.max(2, (dataArray[i]/255)*50)}px`);
        }
        function toggleMicFeed() { if(!audioStream) startAudio(); else { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; document.getElementById('micBtn').innerText = "Test Instrument Input"; } }
        function toggleCam() { if(!videoStream) startVideo(); else { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; document.getElementById('webcam').style.display = 'none'; document.getElementById('camBtn').innerText = "Click to Turn Video On"; } }
        async function enterJam() {
            await startAudio(); await startVideo();
            document.getElementById('setup-inputs').style.display = 'none';
            document.getElementById('jam-room-display').style.display = 'flex';
            pubnub.subscribe({ channels: ['myroc-global-lobby'] });
            searchInterval = setInterval(() => pubnub.publish({ channel: 'myroc-global-lobby', message: { action: 'searching', peerId: myId } }), 2000);
        }
        function leaveJam() {
            document.getElementById('local-video-container').style.width = '100%';
            document.getElementById('peer-video-container').style.display = 'none';
            document.getElementById('webcam').srcObject = null;
            if(searchInterval) clearInterval(searchInterval);
            pubnub.unsubscribe({ channels: ['myroc-global-lobby'] });
            if(peerConnection) { peerConnection.close(); peerConnection = null; }
            document.getElementById('jam-room-display').style.display = 'none';
            document.getElementById('setup-inputs').style.display = 'block';
        }
    </script>
</body>
</html>

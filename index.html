<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELD | Setup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        /* 1. BRANDING */
        .brand-container {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #ffffff;
        }

        .tagline {
            font-size: 11px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 8px;
            font-weight: 700;
        }

        /* 2. LIVE EQUALIZER VISUALIZER */
        .visualizer-container {
            width: 100%;
            max-width: 360px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
        }

        .eq-bar {
            width: 7px;
            height: 4px; /* Starts completely flat */
            background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%);
            border-radius: 4px;
            box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
            transition: height 0.05s ease; /* Fast response for realism */
        }

        /* 3. CONFIGURATION CARD */
        .setup-card {
            width: 100%;
            max-width: 440px;
            background: #070707;
            border: 1px solid #121212;
            padding: 28px 24px;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.95);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 20px;
        }

        .camera-preview-box {
            width: 100%;
            height: 160px;
            background-color: #0c0c0c;
            border: 1px dashed #222222;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .camera-preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .video-toggle-btn {
            background: #141414;
            border: 1px solid #222222;
            color: #aaaaaa;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 2;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .video-toggle-btn.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666666;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .input-group select {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            color: #ffffff;
            padding: 18px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .input-group select:focus {
            border-color: #00e5ff;
        }

        .jam-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 20px;
            border-radius: 35px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.15);
        }

        .jam-btn:active {
            transform: scale(0.97);
            background: #00e5ff;
        }

        .latency-footer {
            font-size: 10px;
            color: #333333;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo">MELD</div>
        <div class="tagline">High-Fidelity Collaboration Portal</div>
    </div>

    <div class="visualizer-container" id="eqContainer">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
    </div>

    <div class="setup-card">
        
        <div class="camera-preview-box">
            <video id="webcam" autoplay playsinline muted></video>
            <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Video Off</button>
        </div>

        <div class="input-group">
            <label for="instrument">What You're Playing</label>
            <select id="instrument">
                <optgroup label="Strings">
                    <option value="Electric Guitar">🎸 Electric Guitar</option>
                    <option value="Acoustic Guitar">🎸 Acoustic Guitar</option>
                    <option value="Bass Guitar">🎸 Bass Guitar</option>
                </optgroup>
                <optgroup label="Vocals">
                    <option value="Lead Vocals">🎤 Lead Vocals</option>
                    <option value="Backing Vocals">🎙️ Backing Vocals / Mic</option>
                </optgroup>
                <optgroup label="Keys & Synths">
                    <option value="Keyboard / Piano">🎹 Keyboard / Piano</option>
                    <option value="Synthesizer">🎛️ Synthesizer / Midi</option>
                </optgroup>
                <optgroup label="Percussion">
                    <option value="Electronic Drums">🥁 Electronic Drums</option>
                    <option value="Acoustic Drums">🥁 Acoustic Drums</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label for="search">Who You're Looking For</label>
            <select id="search">
                <optgroup label="Strings Needed">
                    <option value="Electric Guitarist">🎸 Electric Guitarist</option>
                    <option value="Acoustic Guitarist">🎸 Acoustic Guitarist</option>
                    <option value="Bass Player">🎸 Bassist</option>
                </optgroup>
                <optgroup label="Vocals Needed">
                    <option value="Vocalist">🎤 Vocalist / Singer</option>
                </optgroup>
                <optgroup label="Keys Needed">
                    <option value="Keyboardist">🎹 Keyboardist</option>
                </optgroup>
                <optgroup label="Percussion Needed">
                    <option value="Drummer">🥁 Drummer / Beatmaker</option>
                </optgroup>
            </select>
        </div>

        <button class="jam-btn" onclick="enterJam()">Jam Now</button>
    </div>

    <div class="latency-footer">
        OPTIMIZED AUDIO ENGINES ACTIVE • 0MS LATENCY
    </div>

    <script>
        let videoStream = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        const barElements = document.querySelectorAll('.eq-bar');

        // Automatically request Mic access to activate Equalizer on load
        window.addEventListener('DOMContentLoaded', () => {
            initAudioVisualizer();
        });

        async function initAudioVisualizer() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 32; // Low bin size for 9 tracking bars
                
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                updateVisualizer();
            } catch (err) {
                console.log("Audio visualizer mic access declined or restricted.");
            }
        }

        function updateVisualizer() {
            if (!analyser) return;
            requestAnimationFrame(updateVisualizer);
            
            analyser.getByteFrequencyData(dataArray);
            
            // Map the frequency data directly to our 9 bars
            for (let i = 0; i < barElements.length; i++) {
                // Read frequency data, scale it down cleanly to fit the 90px max container height
                let value = dataArray[i] || 0;
                let percentHeight = (value / 255) * 85; 
                
                // Keep a minimal base value of 4px so it never completely disappears
                barElements[i].style.height = `${Math.max(4, percentHeight)}px`;
            }
        }

        async function toggleCam() {
            const btn = document.getElementById('camBtn');
            const video = document.getElementById('webcam');

            if (!videoStream) {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = videoStream;
                    video.style.display = 'block';
                    btn.innerText = "Video On";
                    btn.classList.add('active');
                } catch (err) {
                    alert("Unable to access camera.");
                }
            } else {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
                video.style.display = 'none';
                btn.innerText = "Video Off";
                btn.classList.remove('active');
            }
        }

        function enterJam() {
            const inst = document.getElementById('instrument').value;
            const target = document.getElementById('search').value;
            alert(`Searching for rooms pairing a ${inst} with a ${target}...`);
        }
    </script>
</body>
</html>

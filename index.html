<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden; /* Strict viewport layout protection */
            padding-bottom: 10px;
        }

        /* 1. TOP HEADER LINK */
        .umbrella-bar {
            width: 100%;
            background-color: #050505;
            border-bottom: 1px solid #111111;
            padding: 8px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .umbrella-link {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #555555;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }

        .umbrella-link:hover, .umbrella-link:active {
            color: #00e5ff;
        }

        /* 2. BRANDING HEADLINE GROUP */
        .brand-container {
            text-align: center;
            margin-top: 5px;
            width: 100%;
            flex-shrink: 0;
        }

        .logo {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .tagline {
            font-size: 9px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2px;
            font-weight: 700;
        }

        /* 3. CENTRAL CONSOLE CARD FRAME */
        .setup-card {
            width: 90%;
            max-width: 400px;
            background: #060606;
            border: 1px solid #121212;
            padding: 12px 16px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex-shrink: 0;
            margin-top: 8px;
            margin-bottom: 10px;
        }

        /* VIDEO MODULE PREVIEW - SET TO 150px */
        .camera-preview-box {
            width: 100%;
            height: 150px; 
            background-color: #0a0a0a;
            border: 1px dashed #222222;
            border-radius: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .camera-preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .video-toggle-btn {
            background: #111111;
            border: 1px solid #222222;
            color: #888888;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 2;
        }

        .video-toggle-btn.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            color: #00e5ff;
        }

        /* AUDIO VISUALIZER MODULE - SET TO 50px */
        .visualizer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
            width: 100%;
            flex-shrink: 0;
        }

        .visualizer-container {
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .eq-bar {
            flex-grow: 1;
            margin: 0 1px;
            height: 2px;
            background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%);
            border-radius: 1px;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            transition: height 0.04s ease;
        }

        .mic-toggle-link {
            font-size: 9px;
            color: #00e5ff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            background: none;
            border: 1px solid rgba(0, 229, 255, 0.3);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .mic-toggle-link.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
        }

        /* DROPDOWN OPTIONS */
        .input-group {
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .input-group label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555555;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .input-group select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #161616;
            color: #ffffff;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        /* GLOWING ACTION JAM BUTTON */
        .jam-btn {
            width: 100%;
            background: #000000;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
            flex-shrink: 0;
        }

        .jam-btn:active {

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELD | Space</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* MOBILE HEADER */
        .mobile-header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #161616;
            background-color: #0a0a0a;
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .latency-badge {
            font-size: 12px;
            color: #00e5ff;
            background-color: rgba(0, 229, 255, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* MAIN LIVE STAGE */
        .stage-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .space-title {
            position: absolute;
            top: 30px;
            font-size: 15px;
            color: #888888;
            letter-spacing: 0.5px;
        }

        .waveform-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        /* Pulsating Neon Waveform Animation */
        .waveform-circle {
            width: 160px;
            height: 160px;
            border: 2px solid #00e5ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
            animation: pulse 1.6s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.96); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
            50% { transform: scale(1.04); box-shadow: 0 0 45px rgba(0, 229, 255, 0.5); }
            100% { transform: scale(0.96); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
        }

        .inner-dot {
            width: 24px;
            height: 24px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* STATUS FOOTER */
        .status-mic {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666666;
            margin-bottom: 25px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #00e5ff;
            border-radius: 50%;
            box-shadow: 0 0 6px #00e5ff;
        }

        /* FLOATING ACTION BAR */
        .action-bar {
            width: calc(100% - 40px);
            max-width: 340px;
            background-color: #121212;
            border: 1px solid #1f1f1f;
            padding: 16px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .action-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 12px;
        }

        .action-btn.leave {
            color: #ff3b30;
        }

        /* Desktop Layout Override */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .mobile-header { width: 240px; height: 100vh; flex-direction: column; border-right: 1px solid #161616; border-bottom: none; justify-content: flex-start; gap: 40px; }
            .action-bar { margin-bottom: 50px; }
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <div class="logo">MELD</div>
        <div class="latency-badge">0ms latency</div>
    </header>

    <main class="stage-container">
        <div class="space-title">Active Space: Alpha Room</div>

        <div class="waveform-container">
            <div class="waveform-circle">
                <div class="inner-dot"></div>
            </div>
        </div>

        <div class="status-mic">
            <div class="status-dot"></div>
            <span>Studio Mic Connected</span>
        </div>

        <div class="action-bar">
            <button class="action-btn">Mute</button>
            <button class="action-btn">Invite</button>
            <button class="action-btn leave">Leave</button>
        </div>
    </main>

</body>
</html>

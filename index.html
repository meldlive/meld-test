<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyRoc | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh; /* Enforces absolute fixed screen heights */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spreads components out naturally to fill the height */
            align-items: center;
            overflow: hidden; /* Hard cut to kill any scrolling */
            padding-bottom: 5px;
        }

        /* 1. TOP HEADER LINK */
        .umbrella-bar {
            width: 100%;
            background-color: #050505;
            border-bottom: 1px solid #111111;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .umbrella-link {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #555555;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }

        .umbrella-link:hover, .umbrella-link:active {
            color: #00e5ff;
        }

        /* 2. PREMIUM TYPOGRAPHY BRANDING */
        .brand-container {
            text-align: center;
            margin-top: 10px;
            width: 100%;
            flex-shrink: 0;
        }

        .logo {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 8px; /* High-end horizontal tracking */
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 10px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-top: 4px;
            font-weight: 700;
        }

        /* 3. CONSOLE DASHBOARD CARD (EXPANDED & TIGHTENED) */
        .setup-card {
            width: 90%;
            max-width: 400px;
            background: #060606;
            border: 1px solid #121212;
            padding: 20px; /* Reduced breathing room to tighten layout */
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.95);
            flex-grow: 1; /* Card stretches out to fill the gap */
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 25px;
        }

        .camera-preview-box {
            width: 100%;
            height: 130px; /* Shaved vertical dimension */
            background-color: #0a0a0a;
            border: 1px dashed #222222;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .camera-preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .video-toggle-btn {
            background: #111111;
            border: 1px solid #222222;
            color: #888888;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 2;
        }

        .video-toggle-btn.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            color: #00e5ff;
        }

        /* 4. TIGHTENED FULL SCREEN EQUALIZER VISUALIZER */
        .visualizer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
            width: 100%;
            flex-shrink: 0;
        }

        .visualizer-container {
            width: 100%;
            height: 50px; /* Shaved vertical stack height */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }

        .eq-bar {
            flex-grow: 1;
            margin: 0 1px;
            height: 2px;
            background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%);
            border-radius: 1px;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            transition: height 0.04s ease;
        }

        .mic-toggle-link {
            font-size: 10px;
            color: #00e5ff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            background: none;
            border: 1px solid rgba(0, 229, 255, 0.3);
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .mic-toggle-link.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
        }

        /* INPUT GROUPS */
        .input-group {
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555555;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .input-group select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #161616;
            color: #ffffff;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        .jam-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        /* 5. MATCHING NEON BLUE HEXAGON FOOTER DOCK (PULLED INTO VIEW BOUNDS NATIVELY) */
        .footer-network {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            border-top: 1px solid #111111;
            padding-top: 20px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hex-anchor {
            position: relative;
            width: 44px; /* Scaled hexagons down slightly to fit tight bounds */
            height: 25.4px;
            background-color: transparent;
            border-left: 2px solid #00e5ff;
            border-right: 2px solid #00e5ff;
            margin: 12.7px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s;
        }

        .hex-anchor::before, .hex-anchor::after {
            content: "";
            position: absolute;
            width: 31.11px;
            height: 31.11px;
            transform: scaleY(0.5774) rotate(-45deg);
            background-color: transparent;
            left: 4.4px; 
            z-index: 1;
        }

        .hex-anchor::before {
            top: -15.56px;
            border-top: 2px solid #00e5ff;
            border-right: 2px solid #00e5ff;
        }

        .hex-anchor::after {
            bottom: -15.56px;
            border-bottom: 2px solid #00e5ff;
            border-left: 2px solid #00e5ff;
        }

        .hex-inner-symbol {
            font-size: 14px;
            z-index: 5;
            position: relative;
            line-height: 1;
            color: #ffffff;
        }

        .hex-anchor:active {
            transform: scale(1.1);
        }

        .latency-footer {
            font-size: 8px;
            color: #222222;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="umbrella-bar">
        <a href="https://meldliveapp.com" class="umbrella-link" target="_blank">Powered by MELD</a>
    </div>

    <div class="brand-container">
        <div class="logo">MYROC</div>
        <div class="tagline">Direct Line Collaboration Portal</div>
    </div>

    <div class="visualizer-area">
        <div class="visualizer-container" id="eqContainer">
            <script>
                const container = document.getElementById('eqContainer');
                for (let i = 0; i < 60; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'eq-bar';
                    container.appendChild(bar);
                }
            </script>
        </div>
        <button class="mic-toggle-link" id="micBtn" onclick="toggleMicFeed()">Test Instrument Input</button>
    </div>

    <div class="setup-card">
        
        <div class="camera-preview-box">
            <video id="webcam" autoplay playsinline muted></video>
            <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Video Off</button>
        </div>

        <div class="input-group">
            <label for="instrument">What You're Plugging In</label>
            <select id="instrument">
                <option value="Electric Guitar">🎸 Electric Guitar</option>
                <option value="Bass Guitar">🎸 Bass Guitar</option>
                <option value="Electronic Drums">🥁 Electronic Drums</option>
                <option value="Piano / Keyboard">🎹 Digital Piano / Keyboard</option>
                <option value="Electric Violin">🎻 Electric Violin</option>
            </select>
        </div>

        <div class="input-group">
            <label for="search">Who You're Looking For</label>
            <select id="search">
                <option value="Electric Guitarist">🎸 Electric Guitarist</option>
                <option value="Bass Player">🎸 Bassist</option>
                <option value="Drummer">🥁 Drummer</option>
                <option value="Keyboardist">🎹 Keyboardist</option>
                <option value="Violinist">🎻 Violinist</option>
            </select>
        </div>

        <button class="jam-btn" onclick="enterJam()">Jam Now</button>
    </div>

    <div class="footer-network">
        <div class="social-row">
            <a href="https://instagram.com/meldliveapp" class="hex-anchor" target="_blank">
                <i class="fa-brands fa-instagram hex-inner-symbol"></i>
            </a>
            <a href="https://tiktok.com/@meldlive" class="hex-anchor" target="_blank">
                <i class="fa-brands fa-tiktok hex-inner-symbol"></i>
            </a>
            <a href="https://x.com" class="hex-anchor" target="_blank">
                <i class="fa-brands fa-x-twitter hex-inner-symbol"></i>
            </a>
            <a href="mailto:meldliveapp@gmail.com" class="hex-anchor">
                <i class="fa-regular fa-envelope hex-inner-symbol"></i>
            </a>
        </div>
        <div class="latency-footer">
            Server Status: Operational (0ms)
        </div>
    </div>

    <script>
        let videoStream = null;
        let audioStream = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationFrameId = null;
        let barElements = [];

        async function toggleMicFeed() {
            const micBtn = document.getElementById('micBtn');
            barElements = document.querySelectorAll('.eq-bar');

            if (!audioStream) {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaStreamSource(audioStream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256; // Increased fft resolution to handle 60 discrete bands cleanly
                    source.connect(analyser);
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    micBtn.innerText = "Mute Input";
                    micBtn.classList.add('active');
                    updateVisualizer();
                } catch (err) {
                    alert("Input permission was denied.");
                }
            } else {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                for (let i = 0; i < barElements.length; i++) barElements[i].style.height = '2px';
                micBtn.innerText = "Test Instrument Input";
                micBtn.classList.remove('active');
            }
        }

        function updateVisualizer() {
            if (!analyser) return;
            animationFrameId = requestAnimationFrame(updateVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            for (let i = 0; i < barElements.length; i++) {
                // Logarithmic distribution profile so tracking visual reads naturally across deep bass/high guitar string ranges
                let binIndex = Math.floor(Math.pow(i / barElements.length, 1.5) * (dataArray.length * 0.7));
                let value = dataArray[binIndex] || 0;
                let percentHeight = (value / 255) * 85; 
                barElements[i].style.height = `${Math.max(2, percentHeight)}px`;
            }
        }

        async function toggleCam() {
            const btn = document.getElementById('camBtn');
            const video = document.getElementById('webcam');

            if (!videoStream) {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = videoStream;
                    video.style.display = 'block';
                    btn.innerText = "Video On";
                    btn.classList.add('active');
                } catch (err) {
                    alert("Camera capture permission was denied.");
                }
            } else {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
                video.style.display = 'none';
                btn.innerText = "Video Off";
                btn.classList.remove('active');
            }
        }

        function enterJam() {
            const inst = document.getElementById('instrument').value;
            const target = document.getElementById('search').value;
            alert(`Searching MyRoc servers pairing your ${inst} with a ${target}...`);
        }
    </script>
</body>
</html>

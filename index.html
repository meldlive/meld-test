<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden; padding-bottom: 10px; }
        .umbrella-bar { width: 100%; background-color: #050505; border-bottom: 1px solid #111111; padding: 8px 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .umbrella-link { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #555555; text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
        .brand-container { text-align: center; margin-top: 5px; width: 100%; flex-shrink: 0; }
        .logo { font-size: 34px; font-weight: 900; letter-spacing: 8px; background: linear-gradient(180deg, #ffffff 0%, #888888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; line-height: 1.1; }
        .tagline { font-size: 9px; color: #444444; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; font-weight: 700; }
        .setup-card { width: 90%; max-width: 400px; background: #060606; border: 1px solid #121212; padding: 24px 16px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: flex-start; flex-shrink: 0; margin-top: 8px; margin-bottom: 10px; }
        .gate-title { font-size: 14px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 15px; font-weight: 800; }
        .gate-input { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 12px; border-radius: 12px; font-size: 16px; outline: none; text-align: center; letter-spacing: 3px; transition: all 0.2s ease; margin-bottom: 15px; }
        .gate-error-msg { color: #ff3b30; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; display: none; font-weight: 700; }
        .signup-section { margin-top: 20px; border-top: 1px solid #161616; padding-top: 20px; }
        .signup-text { font-size: 9px; color: #555555; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; }
        .camera-preview-box { width: 100%; height: 150px; background-color: #0a0a0a; border: 1px dashed #222222; border-radius: 14px; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; flex-shrink: 0; }
        .camera-preview-box video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        .video-toggle-btn { background: #111111; border: 1px solid #222222; color: #888888; padding: 8px 16px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; z-index: 2; position: relative; transition: all 0.2s; }
        .visualizer-area { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 10px; width: 100%; flex-shrink: 0; }
        .visualizer-container { width: 100%; height: 50px; display: flex; align-items: center; justify-content: space-between; }
        .eq-bar { flex-grow: 1; margin: 0 1px; height: 2px; background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%); border-radius: 1px; box-shadow: 0 0 8px rgba(0, 229, 255, 0.4); }
        .mic-toggle-link { font-size: 9px; color: #00e5ff; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; background: none; border: 1px solid rgba(0, 229, 255, 0.3); cursor: pointer; padding: 4px 10px; border-radius: 20px; transition: all 0.2s; }
        .input-group { margin-bottom: 8px; flex-shrink: 0; }
        .input-group label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #555555; margin-bottom: 4px; font-weight: 700; }
        .input-group select { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 600; outline: none; appearance: none; }
        .jam-btn { width: 100%; background: #000000; color: #00e5ff; border: 2px solid #00e5ff; padding: 12px; border-radius: 30px; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: all 0.2s ease; }
        .footer-network { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 5px; flex-shrink: 0; }
        .social-row { display: flex; justify-content: center; align-items: center; gap: 16px; }
        .hex-anchor { position: relative; width: 34px; height: 19.63px; border-left: 2px solid #00e5ff; border-right: 2px solid #00e5ff; margin: 4px 0; display: flex; justify-content: center; align-items: center; text-decoration: none; color: #ffffff; }
    </style>
</head>
<body> 
    <div class="brand-container">
        <div class="logo">MYROC</div>
        <div class="tagline">Beta Portal Access</div>
    </div>

    <div class="setup-card" id="app-portal-card">
        <div class="camera-preview-box">
            <video id="webcam" autoplay playsinline muted></video>
            <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Click to Turn Video On</button>
        </div>
        <div class="visualizer-area">
            <div class="visualizer-container" id="eqContainer"></div>
            <button class="mic-toggle-link" id="micBtn" onclick="toggleMic()">Test Instrument Input</button>
        </div>
        <div id="setup-controls">
            <div class="input-group">
                <label>You</label>
                <select id="instrument"><option value="guitar">Guitar</option><option value="drums">Drums</option></select>
            </div>
            <button class="jam-btn" id="jamBtn" onclick="toggleJam()">Jam Now</button>
        </div>
    </div>

    <script>
        let myId = 'ID-' + Math.floor(Math.random()*9000);
        let pubnub = new PubNub({ publishKey: 'pub-c-987e3578-5b94-4326-a99f-6119854af048', subscribeKey: 'sub-c-5aed2913-ab13-4dbc-b66f-ff97ec4ae16c', userId: myId });
        let isJamming = false;
        let vStream = null; let aStream = null;

        async function toggleCam() {
            if (vStream) {
                vStream.getTracks().forEach(t => t.stop()); vStream = null;
                document.getElementById('webcam').style.display = 'none';
                document.getElementById('camBtn').innerText = "Click to Turn Video On";
            } else {
                vStream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam').srcObject = vStream;
                document.getElementById('webcam').style.display = 'block';
                document.getElementById('camBtn').innerText = "Turn Video Off";
            }
        }

        async function toggleMic() {
            if (aStream) {
                aStream.getTracks().forEach(t => t.stop()); aStream = null;
                document.getElementById('micBtn').innerText = "Test Instrument Input";
            } else {
                aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('micBtn').innerText = "Stop Testing Input";
            }
        }

        function toggleJam() {
            if (!isJamming) {
                isJamming = true;
                document.getElementById('jamBtn').innerText = "Disconnect";
                pubnub.subscribe({ channels: ['lobby'] });
                // Start matching logic...
            } else {
                isJamming = false;
                document.getElementById('jamBtn').innerText = "Jam Now";
                if(vStream) toggleCam();
                if(aStream) toggleMic();
                pubnub.unsubscribe({ channels: ['lobby'] });
            }
        }
    </script>
</body>
</html>

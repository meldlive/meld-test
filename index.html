<script>
    // OBFUSCATION SHIELD: Disables inspector hotkeys (F12, Command/Ctrl options)
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
           (e.ctrlKey && e.shiftKey && e.keyCode == 73) || 
           (e.ctrlKey && e.shiftKey && e.keyCode == 74) || 
           (e.metaKey && e.altKey && e.keyCode == 73)) {
            return false;
        }
    };

    window.onerror = function(message, source, lineno, colno, error) {
        const footer = document.getElementById('latency-val');
        if (footer) { footer.innerText = "Error: " + message + " (Line " + lineno + ")"; footer.style.color = '#ff3b30'; }
        return false;
    };

    const BETA_ACCESS_KEY = "meldjam"; 

    function handleGateKeyPress(event) {
        if (event.key === "Enter") {
            verifyBetaPassword();
        }
    }

    function verifyBetaPassword() {
        const inputVal = document.getElementById('portal-password').value.trim();
        const errorMsg = document.getElementById('gate-error');
        
        if (inputVal.toLowerCase() === BETA_ACCESS_KEY.toLowerCase()) {
            revealMainPortal();
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('portal-password').value = "";
        }
    }

    function revealMainPortal() {
        document.getElementById('password-gate-card').style.display = 'none';
        document.getElementById('app-portal-card').style.display = 'block';
        document.getElementById('brand-tagline').innerText = "Audio Collaboration Engine";
        initializeEngineAndConnection();
    }

    let videoStream = null; let audioStream = null; let audioContext = null; let analyser = null; let dataArray = null; let animationFrameId = null; let barElements = [];
    let myId = null; let peerConnection = null; let pubnub = null; let currentLobbyChannel = 'myroc-global-lobby'; let searchInterval = null; let targetPeerId = null;

    // OPTIMIZED: Trimmed ICE servers for faster candidate gathering (2 STUN + 1 TURN)
    const rtcConfig = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            {
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelay',
                credential: 'openrelay'
            }
        ],
        iceCandidatePoolSize: 10
    };

    const searchLabels = {
        'guitar': 'Electric Guitar',
        'bass': 'Bass Guitar',
        'drums': 'Electronic Drums',
        'keys': 'Digital Piano / Keyboard',
        'violin': 'Electric Violin'
    };

    function initializeEngineAndConnection() {
        if (typeof PubNub === 'undefined') {
            document.getElementById('latency-val').innerText = "Error: Matchmaker SDK Blocked.";
            document.getElementById('latency-val').style.color = '#ff3b30';
            return;
        }

        myId = 'MYROC-' + Math.floor(1000 + Math.random() * 9000);

        try {
            pubnub = new PubNub({
                publishKey: 'pub-c-987e3578-5b94-4326-a99f-6119854af048',
                subscribeKey: 'sub-c-5aed2913-ab13-4dbc-b66f-ff97ec4ae16c',
                userId: myId
            });

            pubnub.addListener({
                message: function(event) {
                    const msg = event.message;
                    if (msg.senderId === myId || msg.peerId === myId) return;

                    const myInstrument = document.getElementById('instrument').value;
                    const myTarget = document.getElementById('search').value;

                    if (msg.action === 'searching' && msg.instrument === myTarget && msg.lookingFor === myInstrument) {
                        if (myId < msg.peerId) {
                            targetPeerId = msg.peerId;
                            if (searchInterval) { clearInterval(searchInterval); searchInterval = null; }
                            initiateWebRTCCall(targetPeerId);
                        } else {
                            targetPeerId = msg.peerId;
                            if (searchInterval) { clearInterval(searchInterval); searchInterval = null; }
                            document.getElementById('jam-status').innerText = "CONNECTING DIRECTLY...";
                        }
                    }
                    else if (msg.action === 'sdp-offer' && msg.targetId === myId) { handleSDPOffer(msg); }
                    else if (msg.action === 'sdp-answer' && msg.targetId === myId) { handleSDPAnswer(msg); }
                    else if (msg.action === 'ice-candidate' && msg.targetId === myId) { handleICECandidate(msg); }
                    else if (msg.action === 'disconnected' && msg.peerId === targetPeerId) { leaveJam(); }
                }
            });

            pubnub.subscribe({ channels: [currentLobbyChannel] });

            document.getElementById('latency-val').innerText = "System Status: Ready to Jam";
            document.getElementById('latency-val').style.color = '#00e5ff';

        } catch (err) {
            console.error("Matrix execution error: ", err);
        }
    }

    function getLocalStream() {
        const combinedStream = new MediaStream();
        if (videoStream) videoStream.getVideoTracks().forEach(t => combinedStream.addTrack(t));
        if (audioStream) audioStream.getAudioTracks().forEach(t => combinedStream.addTrack(t));
        return combinedStream;
    }

    function createPeerConnection() {
        if (peerConnection) return;

        peerConnection = new RTCPeerConnection(rtcConfig);

        peerConnection.onconnectionstatechange = () => {
            const state = peerConnection.connectionState;
            const footer = document.getElementById('latency-val');
            if (footer) {
                if (state === 'connecting') {
                    footer.innerText = "Network Engine: Connecting across towns...";
                    footer.style.color = '#888888';
                } else if (state === 'connected') {
                    footer.innerText = "P2P Connection: Active (12ms Latency)";
                    footer.style.color = '#00e5ff';
                    
                    // NEW: Prioritize audio sender with high bitrate immediately on connection
                    try {
                        const audioSender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
                        if (audioSender) {
                            const params = audioSender.getParameters();
                            if (params.encodings && params.encodings.length > 0) {
                                params.encodings[0].maxBitrate = 128000;
                                if ('priority' in params.encodings[0]) {
                                    params.encodings[0].priority = 'high';
                                }
                                audioSender.setParameters(params).catch(() => {});
                            }
                        }
                    } catch (e) {}
                    
                    monitorConnectionBandwidth();
                } else if (state === 'failed' || state === 'disconnected') {
                    footer.innerText = "Network Bridge Blocked. Retrying stream...";
                    footer.style.color = '#ff3b30';
                }
            }
        };

        const localFeed = getLocalStream();
        localFeed.getTracks().forEach(track => {
            peerConnection.addTrack(track, localFeed);
        });

        peerConnection.onicecandidate = (event) => {
            if (event.candidate && targetPeerId && pubnub) {
                pubnub.publish({
                    channel: currentLobbyChannel,
                    message: {
                        action: 'ice-candidate',
                        targetId: targetPeerId,
                        senderId: myId,
                        candidate: event.candidate
                    }
                });
            }
        };

        peerConnection.ontrack = (event) => {
            const currentSearchKey = document.getElementById('search').value;
            const cleanTargetName = searchLabels[currentSearchKey];
            handleMatchedPeerStream(event.streams[0], cleanTargetName);
        };
    }

    // REAL-TIME AUDIO-FIRST BANDWIDTH AND PACKET LOSS MONITOR
    function monitorConnectionBandwidth() {
        if (!peerConnection) return;

        const intervalId = setInterval(async () => {
            if (!peerConnection || peerConnection.connectionState !== 'connected') {
                clearInterval(intervalId);
                return;
            }

            try {
                const stats = await peerConnection.getStats();
                let packetLoss = 0;
                let roundTripTime = 0;

                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' && (report.kind === 'audio' || report.kind === 'video')) {
                        packetLoss = report.packetsLost || 0;
                    }
                    if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                        roundTripTime = (report.currentRoundTripTime || 0) * 1000;
                    }
                });

                // Target Trigger: Latency over 200ms or loss triggers Audio Priority Shield
                if (roundTripTime > 200 || packetLoss > 10) {
                    triggerLowBandwidthMode();
                    clearInterval(intervalId);
                }
            } catch (err) {
                console.warn("Stats read bypass:", err);
            }
        }, 1500); 
    }

    // DISRUPT VIDEO CHANNELS & ALLOCATE ALL NETWORK PIPES TO OPUS AUDIO STREAM
    function triggerLowBandwidthMode() {
        document.getElementById('bw-warning-shield').style.display = 'flex';

        if (videoStream) {
            videoStream.getVideoTracks().forEach(track => {
                track.enabled = false; // Stops frame capture to free cellular cpu
            });
        }

        const latencyFooter = document.getElementById('latency-val');
        if (latencyFooter) {
            latencyFooter.innerText = "Audio Locked (Video Offline for Low Bandwidth)";
            latencyFooter.style.color = '#ffaa00';
        }
    }

    // AUDIO-FIRST SDP PARSER: Injects Opus parameters directly into SDP streams for extreme priority
    // OPTIMIZED for music/low-latency: ptime=10, fec=0, dtx=0
    function optimizeSDPForAudio(sdp) {
        let lines = sdp.split('\r\n');
        let mAudioIndex = -1;
        let fmtpIndex = -1;

        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('m=audio')) {
                mAudioIndex = i;
            }
            if (mAudioIndex !== -1 && lines[i].startsWith('a=fmtp:') && lines[i].includes('opus')) {
                fmtpIndex = i;
                break;
            }
        }

        if (fmtpIndex !== -1) {
            const payload = lines[fmtpIndex].split(':')[1].trim().split(' ')[0];
            lines[fmtpIndex] = `a=fmtp:${payload} maxaveragebitrate=128000;useinbandfec=0;usedtx=0;stereo=1`;
        }

        // Add explicit ptime for lower packetization latency (critical for tight jamming)
        if (mAudioIndex !== -1) {
            lines.splice(mAudioIndex + 1, 0, 'a=ptime:10');
        }

        return lines.join('\r\n');
    }

    async function initiateWebRTCCall(targetId) {
        document.getElementById('jam-status').innerText = "INITIATING LIVE CONNECTION...";
        createPeerConnection();

        try {
            let offer = await peerConnection.createOffer({
                offerToReceiveAudio: 1,
                offerToReceiveVideo: 1
            });
            
            offer.sdp = optimizeSDPForAudio(offer.sdp);
            await peerConnection.setLocalDescription(offer);

            const myInstrument = document.getElementById('instrument').value;
            if (pubnub) {
                pubnub.publish({
                    channel: currentLobbyChannel,
                    message: {
                        action: 'sdp-offer',
                        targetId: targetId,
                        senderId: myId,
                        offer: offer,
                        instrument: myInstrument
                    }
                });
            }
        } catch (err) {
            console.error("Offer setup error: ", err);
        }
    }

    async function handleSDPOffer(msg) {
        targetPeerId = msg.senderId;
        createPeerConnection();

        try {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.offer));
            let answer = await peerConnection.createAnswer();
            
            answer.sdp = optimizeSDPForAudio(answer.sdp);
            await peerConnection.setLocalDescription(answer);

            if (pubnub) {
                pubnub.publish({
                    channel: currentLobbyChannel,
                    message: {
                        action: 'sdp-answer',
                        targetId: targetPeerId,
                        senderId: myId,
                        answer: answer
                    }
                });
            }
        } catch (err) {
            console.error("Offer processing failure: ", err);
        }
    }

    async function handleSDPAnswer(msg) {
        try {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.answer));
            }
        } catch (err) {
            console.error("Answer negotiation failure: ", err);
        }
    }

    async function handleICECandidate(msg) {
        if (peerConnection) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
            } catch (err) {
                console.error("ICE injection failure: ", err);
            }
        }
    }

    function handleMatchedPeerStream(remoteStream, targetName = "Matched Partner") {
        if (searchInterval) {
            clearInterval(searchInterval);
            searchInterval = null;
        }

        const peerVideoElement = document.getElementById('peerWebcam');
        peerVideoElement.srcObject = remoteStream;
        peerVideoElement.style.display = 'block';
        
        document.getElementById('jam-status').innerText = `CONNECTED! Jamming with ${targetName}`;
        document.getElementById('jam-status').style.color = '#00e5ff';

        document.getElementById('local-video-container').style.width = '50%';
        document.getElementById('peer-video-container').style.display = 'flex';
        document.getElementById('peer-placeholder').style.display = 'none';
    }

    async function startAudio() {
        if (!audioStream) {
            const micBtn = document.getElementById('micBtn');
            barElements = document.querySelectorAll('.eq-bar');
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        latency: 0.005,
                        channelCount: 2
                    }, 
                    video: false 
                });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                micBtn.innerText = "Mute Input";
                micBtn.classList.add('active');
                updateVisualizer();
            } catch (err) {
                console.warn("Microphone feed failed.", err);
            }
        }
    }

    async function startVideo() {
        if (!videoStream) {
            const btn = document.getElementById('camBtn');
            const video = document.getElementById('webcam');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 24 }
                    } 
                });
                video.srcObject = videoStream;
                video.style.display = 'block';
                btn.innerText = "Turn Video Off"; 
                btn.classList.add('active');
            } catch (err) {
                console.warn("Video camera failed.", err);
            }
        }
    }

    async function toggleMicFeed() {
        if (!audioStream) {
            await startAudio();
        } else {
            audioStream.getTracks().forEach(track => track.stop());
            audioStream = null;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            for (let i = 0; i < barElements.length; i++) barElements[i].style.height = '2px';
            const micBtn = document.getElementById('micBtn');
            micBtn.innerText = "Test Instrument Input";
            micBtn.classList.remove('active');
        }
    }

    function updateVisualizer() {
        if (!analyser) return;
        animationFrameId = requestAnimationFrame(updateVisualizer);
        analyser.getByteFrequencyData(dataArray);
        
        for (let i = 0; i < barElements.length; i++) {
            let binIndex = Math.floor(Math.pow(i / barElements.length, 1.5) * (dataArray.length * 0.7));
            let value = dataArray[binIndex] || 0;
            let percentHeight = (value / 255) * 50; 
            barElements[i].style.height = `${Math.max(2, percentHeight)}px`;
        }
    }

    async function toggleCam() {
        if (!videoStream) {
            await startVideo();
        } else {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
            const video = document.getElementById('webcam');
            video.style.display = 'none';
            const btn = document.getElementById('camBtn');
            btn.innerText = "Click to Turn Video On"; 
            btn.classList.remove('active');
        }
    }

    async function enterJam() {
        const instKey = document.getElementById('instrument').value;
        const targetKey = document.getElementById('search').value;
        const latencyFooter = document.getElementById('latency-val');
        
        const cleanTargetName = searchLabels[targetKey];
        
        await startAudio();
        // Video is now OPTIONAL for lowest audio latency.
        // The "Click to Turn Video On" button still works fully if the user wants video later.
        // This keeps the initial WebRTC negotiation audio-first (smaller SDP, no video encoder competing for resources).

        document.getElementById('setup-inputs').style.display = 'none';
        
        document.getElementById('jam-status').innerText = `SEARCHING FOR A ${cleanTargetName.toUpperCase()}...`;
        document.getElementById('jam-status').style.color = '#888888';
        latencyFooter.innerText = "Lobby Status: Matchmaking Active...";
        latencyFooter.style.color = '#888888';
        
        const jamDisplay = document.getElementById('jam-room-display');
        jamDisplay.style.display = 'flex';

        document.getElementById('local-video-container').style.width = '100%';
        document.getElementById('peer-video-container').style.display = 'none';
        document.getElementById('peerWebcam').style.display = 'none';
        document.getElementById('peer-placeholder').style.display = 'flex';

        const peerAvatar = document.getElementById('peer-avatar');
        if (targetKey === "guitar" || targetKey === "bass") peerAvatar.innerText = "🎸";
        else if (targetKey === "drums") peerAvatar.innerText = "🥁";
        else if (targetKey === "keys") peerAvatar.innerText = "🎹";
        else if (targetKey === "violin") peerAvatar.innerText = "🎻";

        document.getElementById('peer-label').innerText = cleanTargetName;

        const sendSearchBroadcast = () => {
            if (pubnub) {
                pubnub.publish({
                    channel: currentLobbyChannel,
                    message: {
                        action: 'searching',
                        peerId: myId,
                        instrument: instKey,
                        lookingFor: targetKey
                    }
                });
            }
        };

        sendSearchBroadcast();
        if (searchInterval) clearInterval(searchInterval);
        searchInterval = setInterval(sendSearchBroadcast, 2000);
    }

    // DISCONNECTED: Completely releases camera/microphone hardware locks when leaving
    function leaveJam() {
        if (searchInterval) {
            clearInterval(searchInterval);
            searchInterval = null;
        }

        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        targetPeerId = null;

        // Stop and release camera tracks
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
        }
        const video = document.getElementById('webcam');
        video.style.display = 'none';
        
        const camBtn = document.getElementById('camBtn');
        camBtn.innerText = "Click to Turn Video On"; 
        camBtn.classList.remove('active');

        // Stop and release microphone tracks
        if (audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
            audioStream = null;
        }
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        for (let i = 0; i < barElements.length; i++) {
            barElements[i].style.height = '2px';
        }
        
        const micBtn = document.getElementById('micBtn');
        micBtn.innerText = "Test Instrument Input";
        micBtn.classList.remove('active');

        document.getElementById('bw-warning-shield').style.display = 'none';

        if (pubnub) {
            pubnub.publish({
                channel: currentLobbyChannel,
                message: {
                    action: 'disconnected',
                    peerId: myId
                }
            });
        }

        document.getElementById('jam-room-display').style.display = 'none';
        document.getElementById('setup-inputs').style.display = 'block';

        document.getElementById('local-video-container').style.width = '100%';
        document.getElementById('peer-video-container').style.display = 'none';
        document.getElementById('peerWebcam').style.display = 'none';
        document.getElementById('peer-placeholder').style.display = 'flex';

        const latencyFooter = document.getElementById('latency-val');
        latencyFooter.innerText = "System Status: Ready to Jam";
        latencyFooter.style.color = '#00e5ff';
    }
</script>

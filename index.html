<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYROC | Powered by MELD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden; padding-bottom: 10px; }
        .umbrella-bar { width: 100%; background-color: #050505; border-bottom: 1px solid #111111; padding: 8px 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .umbrella-link { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #555555; text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
        .brand-container { text-align: center; margin-top: 5px; width: 100%; flex-shrink: 0; }
        .logo { font-size: 34px; font-weight: 900; letter-spacing: 8px; background: linear-gradient(180deg, #ffffff 0%, #888888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; line-height: 1.1; }
        .tagline { font-size: 9px; color: #444444; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; font-weight: 700; }
        .setup-card { width: 90%; max-width: 400px; background: #060606; border: 1px solid #121212; padding: 24px 16px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: flex-start; flex-shrink: 0; margin-top: 8px; margin-bottom: 10px; }
        .gate-title { font-size: 14px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 15px; font-weight: 800; }
        .gate-input { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 12px; border-radius: 12px; font-size: 16px; outline: none; text-align: center; letter-spacing: 3px; transition: all 0.2s ease; margin-bottom: 15px; }
        .gate-error-msg { color: #ff3b30; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; display: none; font-weight: 700; }
        .signup-section { margin-top: 20px; border-top: 1px solid #161616; padding-top: 20px; }
        .signup-text { font-size: 9px; color: #555555; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; }
        .camera-preview-box { width: 100%; height: 150px; background-color: #0a0a0a; border: 1px dashed #222222; border-radius: 14px; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; flex-shrink: 0; }
        .camera-preview-box video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        .bandwidth-shield { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.9); border-radius: 14px; z-index: 10; flex-direction: column; justify-content: center; align-items: center; padding: 15px; text-align: center; }
        .bandwidth-shield i { font-size: 24px; color: #ffaa00; margin-bottom: 8px; text-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        .bandwidth-shield h4 { font-size: 10px; color: #ffffff; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .bandwidth-shield p { font-size: 8px; color: #666666; text-transform: uppercase; letter-spacing: 1px; }
        .video-toggle-btn { background: #111111; border: 1px solid #222222; color: #888888; padding: 8px 16px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; z-index: 2; position: relative; transition: all 0.2s; }
        .video-toggle-btn.active { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.6); border-color: #00e5ff; color: #00e5ff; backdrop-filter: blur(4px); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); padding: 6px 12px; }
        .visualizer-area { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 10px; width: 100%; flex-shrink: 0; }
        .visualizer-container { width: 100%; height: 50px; display: flex; align-items: center; justify-content: space-between; }
        .eq-bar { flex-grow: 1; margin: 0 1px; height: 2px; background: linear-gradient(180deg, #00e5ff 0%, #0088ff 100%); border-radius: 1px; box-shadow: 0 0 8px rgba(0, 229, 255, 0.4); transition: height 0.04s ease; }
        .mic-toggle-link { font-size: 9px; color: #00e5ff; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; background: none; border: 1px solid rgba(0, 229, 255, 0.3); cursor: pointer; padding: 4px 10px; border-radius: 20px; transition: all 0.2s; }
        .mic-toggle-link.active { background: rgba(0, 229, 255, 0.1); border-color: #00e5ff; }
        .input-group { margin-bottom: 8px; flex-shrink: 0; }
        .input-group label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #555555; margin-bottom: 4px; font-weight: 700; }
        .input-group select { width: 100%; background: #0a0a0a; border: 1px solid #161616; color: #ffffff; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 600; outline: none; appearance: none; -webkit-appearance: none; }
        .jam-btn { width: 100%; background: #000000; color: #00e5ff; border: 2px solid #00e5ff; padding: 12px; border-radius: 30px; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 0 12px rgba(0, 229, 255, 0.15); flex-shrink: 0; }
        .jam-btn:active { transform: scale(0.98); background: #00e5ff; color: #000000; box-shadow: 0 0 25px #00e5ff; }
        .footer-network { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 5px; flex-shrink: 0; }
        .social-row { display: flex; justify-content: center; align-items: center; gap: 16px; }
        .hex-anchor { position: relative; width: 34px; height: 19.63px; border-left: 2px solid #00e5ff; border-right: 2px solid #00e5ff; margin: 4px 0; display: flex; justify-content: center; align-items: center; text-decoration: none; color: #ffffff; }
        .hex-anchor::before, .hex-anchor::after { content: ""; position: absolute; width: 24.04px; height: 24.04px; transform: scaleY(0.5774) rotate(-45deg); background-color: transparent; left: 3.4px; z-index: 1; }
        .hex-anchor::before { top: -12.02px; border-top: 2px solid #00e5ff; border-right: 2px solid #00e5ff; }
        .hex-anchor::after { bottom: -12.02px; border-bottom: 2px solid #00e5ff; border-left: 2px solid #00e5ff; }
        .hex-inner-symbol { font-size: 11px; z-index: 5; position: relative; }
        .latency-footer { font-size: 8px; color: #222222; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; text-align: center; width: 100%; }
        @keyframes pulse { 0% { transform: scale(0.92); opacity: 0.6; } 100% { transform: scale(1.08); opacity: 1; } }
        @keyframes peerEQ { 0% { height: 2px; } 50% { height: 16px; } 100% { height: 4px; } }
        @keyframes peerEQ-alt { 0% { height: 6px; } 50% { height: 3px; } 100% { height: 14px; } }
        .peer-eq-bar { width: 2px; background: #00e5ff; border-radius: 1px; box-shadow: 0 0 6px rgba(0, 229, 255, 0.4); }
    </style>
</head>
<body oncontextmenu="return false;"> 
    <div class="umbrella-bar">
        <a href="https://meldliveapp.com" class="umbrella-link" target="_blank">Powered by MELD</a>
    </div>

    <div class="brand-container">
        <div class="logo">MYROC</div>
        <div class="tagline" id="brand-tagline">Beta Portal Access</div>
    </div>

    <div class="setup-card" id="password-gate-card">
        <h3 class="gate-title">Enter Access Key</h3>
        <input type="password" class="gate-input" id="portal-password" placeholder="••••••••" onkeydown="handleGateKeyPress(event)">
        <div class="gate-error-msg" id="gate-error">Access Denied. Invalid Beta Key.</div>
        <button class="jam-btn" onclick="verifyBetaPassword()">Unlock Portal</button>
        <div class="signup-section">
            <p class="signup-text">Don't have a key? Sign up for Beta access below:</p>
            <form action="https://formspree.io/f/mzdnbnen" method="POST">
                <input type="hidden" name="_next" value="https://meldlive.github.io" />
                <input type="email" name="email" class="gate-input" placeholder="ENTER YOUR EMAIL" required style="font-size: 12px; margin-bottom: 10px;">
                <button type="submit" class="jam-btn" style="border-color: #555555; color: #ffffff; padding: 8px; font-size: 10px;">SUBMIT REQUEST</button>
            </form>
        </div>
    </div>

    <div class="setup-card" id="app-portal-card" style="display: none; padding: 12px 16px;">
        <div class="camera-preview-box">
            <div class="bandwidth-shield" id="bw-warning-shield">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <h4>Bandwidth Warning</h4>
                <p>Poor Connection. Video disabled to prioritize zero-lag audio stream.</p>
            </div>
            <div id="local-video-container" style="width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; transition: width 0.3s ease;">
                <video id="webcam" autoplay playsinline muted></video>
                <button class="video-toggle-btn" id="camBtn" onclick="toggleCam()">Click to Turn Video On</button>
            </div>
            <div id="peer-video-container" style="display: none; width: 50%; height: 100%; border-left: 1px solid #121212; position: relative; background: #080808; flex-direction: column; justify-content: center; align-items: center; transition: all 0.3s ease;">
                <video id="peerWebcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1;"></video>
                <div id="peer-placeholder" style="z-index: 2; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div id="peer-avatar" style="font-size: 28px; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.4)); animation: pulse 1.5s infinite alternate;">🥁</div>
                    <span id="peer-label" style="font-size: 8px; color: #00e5ff; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; font-weight: 700;">Matched Peer</span>
                    <div style="display: flex; gap: 2px; height: 18px; align-items: flex-end; margin-top: 6px;">
                        <div class="peer-eq-bar" style="animation: peerEQ 0.4s infinite ease alternate;"></div>
                        <div class="peer-eq-bar" style="animation: peerEQ-alt 0.5s infinite ease alternate 0.1s;"></div>
                        <div class="peer-eq-bar" style="animation: peerEQ 0.3s infinite ease alternate 0.2s;"></div>
                        <div class="peer-eq-bar" style="animation: peerEQ-alt 0.6s infinite ease alternate 0.05s;"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="visualizer-area">
            <div class="visualizer-container" id="eqContainer">
                <script>
                    const container = document.getElementById('eqContainer');
                    for (let i = 0; i < 60; i++) {
                        const bar = document.createElement('div');
                        bar.className = 'eq-bar';
                        container.appendChild(bar);
                    }
                </script>
            </div>
            <button class="mic-toggle-link" id="micBtn" onclick="toggleMicFeed()">Test Instrument Input</button>
        </div>
        <div id="setup-inputs">
            <div class="input-group">
                <label for="instrument">What You're Plugging In</label>
                <select id="instrument">
                    <option value="guitar">🎸 Electric Guitar</option>
                    <option value="bass">🎸 Bass Guitar</option>
                    <option value="drums">🥁 Electronic Drums</option>
                    <option value="keys">🎹 Digital Piano / Keyboard</option>
                    <option value="violin">🎻 Electric Violin</option>
                </select>
            </div>
            <div class="input-group">
                <label for="search">Who You're Looking For</label>
                <select id="search">
                    <option value="guitar">🎸 Electric Guitar</option>
                    <option value="bass">🎸 Bass Guitar</option>
                    <option value="drums">🥁 Electronic Drums</option>
                    <option value="keys">🎹 Digital Piano / Keyboard</option>
                    <option value="violin">🎻 Electric Violin</option>
                </select>
            </div>
            <button class="jam-btn" onclick="enterJam()">Jam Now</button>
        </div>
        <div id="jam-room-display" style="display: none; flex-direction: column; align-items: center; padding: 10px 0; gap: 12px; margin-top: 5px;">
            <h2 style="font-size: 18px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px;">Jam Room</h2>
            <p id="jam-status" style="font-size: 10px; color: #888888; text-transform: uppercase; letter-spacing: 1px; text-align: center; line-height: 1.4;"></p>
            <button class="jam-btn" style="border-color: #ff3b30; color: #ff3b30; box-shadow: 0 0 12px rgba(255, 59, 48, 0.15);" onclick="leaveJam()">Disconnect</button>
        </div>
    </div>

    <div class="footer-network">
        <div class="social-row">
            <a href="https://instagram.com/meldlive" class="hex-anchor" target="_blank"><i class="fa-brands fa-instagram hex-inner-symbol"></i></a>
            <a href="https://tiktok.com/@meldlive" class="hex-anchor" target="_blank"><i class="fa-brands fa-tiktok hex-inner-symbol"></i></a>
            <a href="https://x.com/meldlive" class="hex-anchor" target="_blank"><i class="fa-brands fa-x-twitter hex-inner-symbol"></i></a>
            <a href="mailto:meldliveapp@gmail.com" class="hex-anchor"><i class="fa-regular fa-envelope hex-inner-symbol"></i></a>
        </div>
        <div class="latency-footer" id="latency-val">Network Ready</div>
    </div>

    <script>
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.shiftKey && e.keyCode == 74) || (e.metaKey && e.altKey && e.keyCode == 73)) return false; };
        window.onerror = function(message, source, lineno, colno, error) { const footer = document.getElementById('latency-val'); if (footer) { footer.innerText = "Error: " + message; footer.style.color = '#ff3b30'; } return false; };
        function handleGateKeyPress(event) { if (event.key === "Enter") verifyBetaPassword(); }

        let videoStream = null; let audioStream = null; let audioContext = null; let analyser = null; let dataArray = null; let animationFrameId = null; let barElements = [];
        let myId = null; let peerConnection = null; let pubnub = null; let currentLobbyChannel = 'myroc-global-lobby'; let searchInterval = null; let targetPeerId = null;
        let isMatched = false;

        function verifyBetaPassword() {
            if (document.getElementById('portal-password').value.trim().toLowerCase() === "meldjam") {
                document.getElementById('password-gate-card').style.display = 'none';
                document.getElementById('app-portal-card').style.display = 'block';
                document.getElementById('brand-tagline').innerText = "Audio Collaboration Engine";
                initializePubNub();
            } else { document.getElementById('gate-error').style.display = 'block'; document.getElementById('portal-password').value = ""; }
        }

        function initializePubNub() {
            if (typeof PubNub === 'undefined') return;
            myId = 'MYROC-' + Math.floor(1000 + Math.random() * 9000);
            pubnub = new PubNub({ publishKey: 'pub-c-987e3578-5b94-4326-a99f-6119854af048', subscribeKey: 'sub-c-5aed2913-ab13-4dbc-b66f-ff97ec4ae16c', userId: myId });
            pubnub.addListener({ message: function(event) {
                const msg = event.message;
                if (msg.senderId === myId || isMatched) return;
                
                const myInstrument = document.getElementById('instrument').value;
                const myTarget = document.getElementById('search').value;

                if (msg.action === 'searching' && msg.instrument === myTarget && msg.lookingFor === myInstrument) {
                    isMatched = true;
                    if(searchInterval) clearInterval(searchInterval);
                    targetPeerId = msg.peerId;
                    
                    if (myId > msg.peerId) {
                        initiateWebRTCCall(targetPeerId);
                    } else {
                        document.getElementById('jam-status').innerText = "CONNECTING DIRECTLY...";
                    }
                }
                else if (msg.action === 'sdp-offer' && msg.targetId === myId) handleSDPOffer(msg);
                else if (msg.action === 'sdp-answer' && msg.targetId === myId) handleSDPAnswer(msg);
                else if (msg.action === 'ice-candidate' && msg.targetId === myId) handleICECandidate(msg);
            }});
        }

        async function enterJam() {
            await startAudio(); await startVideo();
            document.getElementById('setup-inputs').style.display = 'none';
            document.getElementById('jam-room-display').style.display = 'flex';
            document.getElementById('jam-status').innerText = "SEARCHING FOR PEER...";
            pubnub.subscribe({ channels: [currentLobbyChannel] });
            searchInterval = setInterval(() => {
                if(!isMatched) {
                    pubnub.publish({ channel: currentLobbyChannel, message: { action: 'searching', peerId: myId, instrument: document.getElementById('instrument').value, lookingFor: document.getElementById('search').value } });
                }
            }, 1000);
        }

        function leaveJam() {
            isMatched = false;
            if(searchInterval) clearInterval(searchInterval);
            pubnub.unsubscribe({ channels: [currentLobbyChannel] });
            if(peerConnection) { peerConnection.close(); peerConnection = null; }
            document.getElementById('jam-room-display').style.display = 'none';
            document.getElementById('setup-inputs').style.display = 'block';
            document.getElementById('webcam').style.display = 'none';
            document.getElementById('bw-warning-shield').style.display = 'none';
            pubnub.publish({ channel: currentLobbyChannel, message: { action: 'disconnected', peerId: myId } });
        }

        /* --- WEBRTC AND AUDIO FUNCTIONS --- */
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'turn:openrelay.metered.ca:80', username: 'openrelay', credential: 'openrelay' }, { urls: 'turn:openrelay.metered.ca:443', username: 'openrelay', credential: 'openrelay' }] };
        const searchLabels = { 'guitar': 'Electric Guitar', 'bass': 'Bass Guitar', 'drums': 'Electronic Drums', 'keys': 'Digital Piano / Keyboard', 'violin': 'Electric Violin' };

        function createPeerConnection() {
            if (peerConnection) return;
            peerConnection = new RTCPeerConnection(rtcConfig);
            peerConnection.onconnectionstatechange = () => { if(peerConnection.connectionState === 'connected') monitorConnectionBandwidth(); };
            const localFeed = new MediaStream();
            if(videoStream) videoStream.getTracks().forEach(t => localFeed.addTrack(t));
            if(audioStream) audioStream.getAudioTracks().forEach(t => localFeed.addTrack(t));
            localFeed.getTracks().forEach(track => peerConnection.addTrack(track, localFeed));
            peerConnection.onicecandidate = (event) => { if(event.candidate && targetPeerId) pubnub.publish({ channel: currentLobbyChannel, message: { action: 'ice-candidate', targetId: targetPeerId, senderId: myId, candidate: event.candidate } }); };
            peerConnection.ontrack = (event) => handleMatchedPeerStream(event.streams[0], searchLabels[document.getElementById('search').value]);
        }

        function monitorConnectionBandwidth() {
            if (!peerConnection) return;
            const intervalId = setInterval(async () => {
                if (!peerConnection || peerConnection.connectionState !== 'connected') { clearInterval(intervalId); return; }
                const stats = await peerConnection.getStats();
                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' && report.kind === 'video' && (report.packetsLost > 10)) { triggerLowBandwidthMode(); clearInterval(intervalId); }
                });
            }, 1500);
        }

        function triggerLowBandwidthMode() {
            document.getElementById('bw-warning-shield').style.display = 'flex';
            if (videoStream) videoStream.getVideoTracks().forEach(track => track.enabled = false);
        }

        function optimizeSDPForAudio(sdp) {
            let lines = sdp.split('\r\n');
            for(let i=0; i<lines.length; i++) {
                if(lines[i].indexOf('a=fmtp:') === 0 && lines[i].indexOf('opus') !== -1) lines[i] += ';maxaveragebitrate=128000;useinbandfec=1;usedtx=1;stereo=1';
            }
            return lines.join('\r\n');
        }

        async function initiateWebRTCCall(targetId) {
            document.getElementById('jam-status').innerText = "INITIATING...";
            createPeerConnection();
            let offer = await peerConnection.createOffer({ offerToReceiveAudio: 1, offerToReceiveVideo: 1 });
            offer.sdp = optimizeSDPForAudio(offer.sdp);
            await peerConnection.setLocalDescription(offer);
            pubnub.publish({ channel: currentLobbyChannel, message: { action: 'sdp-offer', targetId: targetId, senderId: myId, offer: offer, instrument: document.getElementById('instrument').value } });
        }

        async function handleSDPOffer(msg) {
            targetPeerId = msg.senderId; createPeerConnection();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.offer));
            let answer = await peerConnection.createAnswer();
            answer.sdp = optimizeSDPForAudio(answer.sdp);
            await peerConnection.setLocalDescription(answer);
            pubnub.publish({ channel: currentLobbyChannel, message: { action: 'sdp-answer', targetId: targetPeerId, senderId: myId, answer: answer } });
        }

        async function handleSDPAnswer(msg) { await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.answer)); }
        async function handleICECandidate(msg) { await peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate)); }

        function handleMatchedPeerStream(remoteStream, targetName) {
            document.getElementById('peerWebcam').srcObject = remoteStream;
            document.getElementById('peerWebcam').style.display = 'block';
            document.getElementById('jam-status').innerText = `CONNECTED! Jamming with ${targetName}`;
            document.getElementById('local-video-container').style.width = '50%';
            document.getElementById('peer-video-container').style.display = 'flex';
            document.getElementById('peer-placeholder').style.display = 'none';
        }

        async function startAudio() {
            if (!audioStream) {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, latency: 0.005, channelCount: 2 }, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 128;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                barElements = document.querySelectorAll('.eq-bar');
                document.getElementById('micBtn').innerText = "Mute Input"; document.getElementById('micBtn').classList.add('active');
                updateVisualizer();
            }
        }

        async function startVideo() {
            if (!videoStream) {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 24 } } });
                document.getElementById('webcam').srcObject = videoStream; document.getElementById('webcam').style.display = 'block';
                document.getElementById('camBtn').innerText = "Turn Video Off"; document.getElementById('camBtn').classList.add('active');
            }
        }

        function updateVisualizer() {
            if (!analyser) return;
            animationFrameId = requestAnimationFrame(updateVisualizer);
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<barElements.length; i++) {
                let val = dataArray[Math.floor(Math.pow(i/barElements.length, 1.5)*128)] || 0;
                barElements[i].style.height = `${Math.max(2, (val/255)*50)}px`;
            }
        }

        function toggleMicFeed() { if(!audioStream) startAudio(); else { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; cancelAnimationFrame(animationFrameId); barElements.forEach(b => b.style.height = '2px'); document.getElementById('micBtn').innerText = "Test Instrument Input"; document.getElementById('micBtn').classList.remove('active'); } }
        function toggleCam() { if(!videoStream) startVideo(); else { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; document.getElementById('webcam').style.display = 'none'; document.getElementById('camBtn').innerText = "Turn Video On"; document.getElementById('camBtn').classList.remove('active'); } }
    </script>
</body>
</html>
